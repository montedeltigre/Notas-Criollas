<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notas Criollas - Blog de Rienda</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: #fafafa; 
            color: #1a1a1a; 
            line-height: 1.6; 
        }
        .container { max-width: 900px; margin: 0 auto; padding: 2rem; }
        .home-header { text-align: center; padding: 4rem 2rem 2rem; }
        .home-header h1 { font-size: 24px; font-weight: 400; color: #666; margin-bottom: 2rem; }
        .search-box { width: 100%; max-width: 500px; margin: 0 auto; position: relative; }
        .search-input { 
            width: 100%; 
            padding: 12px 16px; 
            font-size: 16px; 
            border: 1px solid #ddd; 
            border-radius: 6px; 
        }
        .search-input:focus { 
            outline: none; 
            border-color: #999; 
            box-shadow: 0 0 0 3px rgba(0,0,0,0.05); 
        }
        .suggestions { 
            position: absolute; 
            top: 100%; 
            left: 0; 
            right: 0; 
            background: white; 
            border: 1px solid #ddd; 
            border-top: none; 
            border-radius: 0 0 6px 6px; 
            max-height: 300px; 
            overflow-y: auto; 
            z-index: 10; 
            display: none; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
        }
        .suggestions.active { display: block; }
        .suggestion-item { 
            padding: 8px 16px; 
            cursor: pointer; 
            font-size: 13px; 
            color: #666; 
            border-bottom: 1px solid #f0f0f0; 
        }
        .suggestion-item:hover { background: #f5f5f5; }
        .filters { 
            display: flex; 
            gap: 12px; 
            flex-wrap: wrap; 
            margin: 2rem 0; 
            align-items: center; 
        }
        .search-control { flex: 1; min-width: 250px; position: relative; }
        .filter-select, .clear-btn { 
            padding: 8px 12px; 
            font-size: 14px; 
            border: 1px solid #ddd; 
            border-radius: 6px; 
            background: white; 
            cursor: pointer; 
        }
        .filter-select:hover, .clear-btn:hover { border-color: #999; }
        .results-info { font-size: 13px; color: #999; margin: 1rem 0; }
        .articles-grid { display: flex; flex-direction: column; gap: 12px; }
        .article-card { 
            padding: 1rem; 
            border: 1px solid #ddd; 
            border-radius: 6px; 
            background: white; 
            cursor: pointer; 
        }
        .article-card:hover { border-color: #999; background: #f9f9f9; }
        .article-card-title { 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-start; 
            gap: 1rem; 
            font-weight: 500; 
            margin-bottom: 0.5rem; 
        }
        .article-card-year { font-size: 13px; color: #999; white-space: nowrap; }
        .article-card-meta { font-size: 13px; color: #999; }
        .back-btn { 
            padding: 8px 12px; 
            font-size: 14px; 
            border: 1px solid #ddd; 
            background: white; 
            border-radius: 6px; 
            cursor: pointer; 
            margin-bottom: 1.5rem; 
        }
        .back-btn:hover { border-color: #999; background: #f5f5f5; }
        .article-view h1 { font-size: 28px; margin-bottom: 0.5rem; }
        .article-view-meta { 
            display: flex; 
            gap: 1.5rem; 
            margin-bottom: 2rem; 
            font-size: 13px; 
            color: #999; 
        }
        .article-view-content { 
            line-height: 1.8; 
            font-size: 15px; 
            white-space: pre-wrap; 
            word-wrap: break-word; 
        }
        .empty-state { text-align: center; padding: 2rem; color: #999; }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        const articlesData = [
            {
                "id": "2011",
                "year": 2011,
                "title": "Final Nacional FZB Categoría A 2011",
                "location": "Palermo",
                "date": "Noviembre 2011",
                "content": "Si hay un momento que todo aquel que por la FZB espera con ansias es la Final Nacional de la Categoría A. El lugar es siempre el mismo: Palermo o la Rural de Palermo, el entusiasmo también y las pruebas en general no varían mucho."
            },
            {
                "id": "2012",
                "year": 2012,
                "title": "Final Nacional FZB Categoría A 2012",
                "location": "Palermo",
                "date": "Marzo 2012",
                "content": "PREMIO PRESIDENTE FELIPE Z. BALLESTER - CATEGORÍA \"A\" - 2012\n\nAfuera la ciudad seguía. El estruendo de esa bestia enorme que es Buenos Aires se repetía como cada día, ignorante de lo que estaba ocurriendo dentro del predio de La Rural. Afuera los colectivos tocaban bocina, las madres retaban a sus hijos y los vendedores ambulantes vociferaban sus precios. Adentro se ajustaban cinchas, se revisaban frenos, se flexionaban músculos, se echaban rezos. Se acercaba la final de la rienda, ese momento único donde los mejores jinetes del mundo criollista se reúnen a ver de qué están hechos, a competir contra sus pares, contra el público, contra ellos mismos. A poner el alma en esos siete minutos eternos y efímeros donde pueden pasar tantas cosas que a veces se confunde el mérito de un logro con una mera lotería.\n\nPor lo tanto, la clasificación final quedó así:\n1. Pablo Sánchez -- Vista Volcán Verijero -- 54,5 pts\n2. Pedro Muñoz -- Tinajera Miralejos -- 53,5 pts\n3. Gonzalo Nievas -- Dormida Pistilla -- 49,5 pts\n4. Pedro Muñoz -- Cricao Malal Chilenera -- 48,5 pts\n5. Raúl González -- Guampa Chismosa -- 46 pts\n\nEterno jinete de todas las finales, top 3 en cualquier estadística, que veía como el reloj de arena seguía pasando y el premio se le seguía negando. Esta vez se le dio y, como suelen ser estas cosas, se le dio con todos los condimentos de un drama angustiante que se define en el último momento y que tiene a todo el mundo sufriendo. No podía ser de otra manera. Felicitaciones Pablo, la Historia te estaba esperando."
            },
            {
                "id": "2013-1",
                "year": 2013,
                "title": "Final Nacional FZB Categoría B 2013",
                "location": "Palermo",
                "date": "Noviembre 2013",
                "content": "PREMIO PRESIDENTE FELIPE Z. BALLESTER - CATEGORÍA \"B\" - 2013\n\nLa rienda es esperar. Esperar que se haga la hora de ensillar, esperar que termine la competencia anterior, esperar que te llamen a pista, esperar que pasen los que van antes que vos. La rienda es esperar y es ingrata porque tenés una sola oportunidad cada vez y porque dura muy poco y porque te sale o te vas a tu casa. Por eso nos gusta.\n\nResultados:\n1. Caruló Inquieta, con Alejandro Moreno. 47,5 pts\n2. Tinajera Rueca, con Nicolás Fazio. 43,5 pts\n3. Ballenera Agua Fuerte, con Julián Gismondi. 37,5 pts\n4. Yancamil Guor, con Pablo Torralba. 33 pts\n5. Compañera Cotorra, con Luciano Bustos. 30 pts\n6. Guay Tiento, con Máximo Correa Dupuy. 29 pts\n\nLa rienda siempre paga. A veces hay menos competidores, otras el nivel no llega al esperado, hay veces en que la pista no está a la altura o que los jurados tienen un mal día. Pero siempre, siempre, hay un volapié que te emociona, una troya que te saca del asiento, un caballo que te deja sin aliento."
            },
            {
                "id": "2013-2",
                "year": 2013,
                "title": "Entrevista a Gonzalo Nievas",
                "location": "Luján de Cuyo",
                "date": "2013",
                "content": "ENTREVISTA A GONZALO NIEVAS - \"Me probé a mí mismo que se pueden ganar cosas sin sangres Facón\"\n\nLa Pistilla entra a la pista y una atracción inevitable te obliga a mirarla. Se mueve elegante, como erguida, con las orejitas paradas y orgullosa, seductora, dama sabedora de que todos la miran. Arriba está el otro protagonista de esta historia. Enhorquetado en su montura tapada en carpincho, con las botas haciendo juego y el traje con botones de plata que ya es su marca registrada, entra Gonzalo puño en el muslo dispuesto a confirmar en esta final todo lo que vino anticipando en la temporada.\n\nGonzalito, contanos de la Pistilla.\n\nLa yegua se compró en un remate de San Baldomero, fue uno de los últimos productos diseñados por Eduardo Ballester. Es una hija del Chuchoca y la Dormida Fantasía. Estaba de redomona corriente, nomás, y para mostrarla un poco le pusieron un freno de patas largas y la apuraron ahí en el remate. No se destacó mucho, el que se destacó fue el Andrajo, que también se embarcó para Mendoza.\n\n¿Qué significa para vos este campeonato?\n\nAl dedicarse a trabajar caballos, el sueño es éste. Lograr destacarse en una yegua que uno elige y quiere. Yo hace unos años decidí abrirme por mi cuenta y dejar de trabajarle caballos a Don Víctor Esevich. Eso me trajo muchísimas peleas con mi papá, muchas discusiones y momentos complicados. Entonces, un poco para probarme algo a mí mismo, pensé que me gustaría salir campeón con un caballo que no tuviera nada de Facón. Y lo logré con esta yegüita, que tiene tanto corazón que al final es más el corazón que sus condiciones."
            },
            {
                "id": "2013-3",
                "year": 2013,
                "title": "Cabalgata de Criadores",
                "location": "Varias locaciones",
                "date": "Febrero 2013",
                "content": "CABALGATA DE CRIADORES\n\nCompetir un criollo hoy es correr en Fórmula 1. Cuidados extremos, vendas, cremas, inyecciones, suplementos, planes de entrenamiento, mantas y boxes. Cuidados necesarios para caballos de elite, ultrapreparados que tienen que desempeñar su actividad en la pista, rayando o apretando vacas, apartando o mostrando la pureza de sus líneas. O recorriendo los 750 km de la Marcha de Resistencia, esa hazaña.\n\nEn el campo siempre hay tiempo. Un mate más, otra historia, el tranquito para revisar las aguadas, la siesta en verano. Eso hace del hombre de campo típico una persona parsimoniosa, tranquila, paciente. En la ciudad no existe ese tiempo. No hay paseos porque hay embotellamientos, no hay un mate más porque se va el colectivo, ni hay oportunidad de historias alargadas.\n\nLa cabalgata nos permite hacer esa metamorfosis, ese cambio de chip que nos deja jugar a hombres de campo por una semana. Pero no porque nos vistamos de faja y pañuelo y andemos a horcajadas todo el día ni porque guitarremos folclore a la nochecita, nos convierte en hombres de campo porque nos regala lo más valioso que se le puede dar a un hombre de ciudad. Nos regala tiempo.\n\nSON CINCO DÍAS DONDE NO HAY QUE LLEGAR TEMPRANO MÁS QUE AL HORARIO DE SALIDA, cinco días donde en el momento en que subís terminaste tus deberes de la jornada y solamente te queda disfrutar del caballo, del paisaje, de los marcheros."
            },
            {
                "id": "2020",
                "year": 2020,
                "title": "Final(es) de la Felipe Z. Ballester \"A\" - 2019-2020 y 2020-2021",
                "location": "La República y Mendoza",
                "date": "Febrero 2020 - Septiembre 2021",
                "content": "Final(es) de la Felipe Z. Ballester \"A\"\n\nA falta de una, dos. En 2020, con la pandemia cerrando todo en plena semifinal y obligando a jinetes y expositores a casi escapar de Jesús María para poder llegar a salvo a sus casas, era difícil pensar que el año no estaba perdido.\n\nFINAL NACIONAL \"A\" CICLO 2019-2020\n\nEntraba Gonzalo Nievas, que tenía más caballos en la final que familiares en la tribuna, esta vez montado en el Leñador. Manantiales de las Palmas Leñador, oscuro importado de Chile que muriera poco después de la final y para quien vaya nuestro recuerdo. Arrancaba bien el pingo, imponente y con andares de 7 puntos y medio, pero se iba diluyendo a medida que la prueba avanzaba.\n\nEn consecuencia y a la vuelta de tantas complicaciones, finalmente teníamos campeón nacional de Rienda \"A\" de la temporada 2019-2020. Gonzalo Nievas en Matute Ayacucho El Chacal era el legítimo campeón.\n\nFINAL NACIONAL \"A\" CICLO 2020-2021\n\nEl lugar, esta vez, era Mendoza. Toda la Rienda del país se había convocado en un cónclave ultraintenso. Fueron cuatro días de emoción, pasión por la Rienda, camaradería y competencia que tuvieron risas y llantos, alegrías y decepciones.\n\nY para muestra, un botón. Con la presencia de Antonio Fazio y Juan Cruz Amestoy como jurados, entraba en primer lugar Tinajera el Jefe montado por Anita de Battista que se convertía en la primera mujer en toda la prolífica historia de la Rienda en mover en una final nacional de la Categoría A.\n\nFinalmente, llegaba el último finalista de la Rienda A. El jinete, nada menos que Pedrín Muñoz y la yegua, Gualta Presumida. La expectativa era total, ya que Pedrín podía ganar después de muchos años. Pedrín Muñoz es Campeón Nacional de Rienda A en Gualta Presumida con 53 puntos."
            },
            {
                "id": "2022",
                "year": 2022,
                "title": "Final Nacional FZB Categoría A 2022",
                "location": "Jesús María",
                "date": "Abril 2022",
                "content": "Final Nacional FZB Categoría A 2022\n\nPor Nicolás Gimbatti\n\nEl día gris no combinaba con la expectativa. La final de la rienda volvía a Jesús María, volvía a hacerse en la fecha habitual, sin barbijos y compartiendo mates. Pero hacía un frío digno de otras épocas y las nubes, que no amenazaban nada, se mantenían ahí como un recuerdo de lo que habían sido los diluvios de las semifinales.\n\nLos jinetes, reconcentrados, deambulaban por la pista sin rumbo aparente, pero mirándolos con detenimiento no había un movimiento que no estuviera calculado. Se venía el sorteo y empezaba a no haber tiempo. Había que calentar los caballos y preguntarles cómo estaban en ese momento, buscarlos a ver si los iban a poder encontrar, tantearlos, prepararse.\n\nPor lo tanto, la clasificación final quedó así:\n\n1. Pedrín Muñoz en Gualta Presumida - 55 puntos\n2. Gonzalo Nievas en Matute Ayacucho El Chacal - 54 puntos\n3. Gonzalo Nievas en Luz Buena Agarrate Villa Seca - 52 puntos\n4. Rodrigo Castells en Ñandú Cañón - 49.5 puntos\n5. Nicolás Moreno en Azote el Revoltoso - 49 puntos\n6. Cristian Aguilera en Tinajera Milonguero - 48 puntos\n7. María Fe de Battista en Arraigado Desterrada - 44.5 puntos\n7. Pedro Muñoz en Tatutí Isleta - 44.5 puntos\n8. Gonzalo Nievas en Campos Guindalero - 43.5 puntos\n\nAsí pasaba una final más de la rienda, con sus alegrías y sus sinsabores y con una cuota amarga también esta vez. Pero la amargura quedó salvada para todos los que estuvimos ahí, porque la entrega de premios nos tenía preparada una sorpresa. Negro querido, te has ganado toda la gratitud que te entre en el cuerpo."
            },
            {
                "id": "2023",
                "year": 2023,
                "title": "La rienda, territorio para las sorpresas",
                "location": "Palermo",
                "date": "Otoño 2023",
                "content": "La rienda, territorio para las sorpresas\n\nTodos los años nos acomodamos alrededor de una pista de arena con la certeza de que muchas cosas van a pasar. Sabemos que los jinetes (y amazonas) finalistas van a dar su mejor esfuerzo, sabemos que va a haber emoción, sabemos que la vamos a pasar bien y sabemos, sobre todo, que no sabemos qué va a pasar cuando se saque el sombrero el último participante.\n\nLa prueba de rienda, especialmente en su categoría máxima, nos viene trayendo, una atrás de la otra, anécdotas y momentos que nadie podía prever cuando sonaba el himno.\n\nPero lo de este 2023, de verdad que va a quedar en los libros de historia. Y lo adelanto al principio de la nota, matando la intriga, porque es tan grande que todos lo sabemos y hay que darle la importancia que se merece. Después de años de trabajo, después de las Copas Femeninas para darle difusión, después de ganar campeonatos en todas las categorías habidas y por haber y después de haber llegado a finales A, en 2023 por primera vez en toda la historia una mujer es Campeona Nacional de Rienda de la máxima categoría.\n\nMaría Fe de Battista, montada en Arraigado Desterrada, se llevó puestos todos los pronósticos y ganó la rienda. Ah, que también era FICCC, por si algo le faltaba.\n\nTenemos el privilegio de ser protagonistas de una época en la que los fundadores de nuestra prueba la siguen viendo, en la que los máximos campeones siguen compitiendo y en la que la juventud se sigue metiendo. Larga vida a esta disciplina, felicitaciones a María Fe y a todo su gran equipo, y que se vengan muchos premios más, muchas mujeres más y muchos nuevos finalistas. El futuro ya llegó y vino para quedarse."
            },
            {
                "id": "2024-25",
                "year": 2025,
                "title": "Final Nacional FZB Categoría A 2024-2025",
                "location": "Palermo",
                "date": "Noviembre 2024",
                "content": "Final Nacional FZB Categoría A - 2024 / 2025\n\nAfuera era un día más. El 37 pasaba por Sarmiento, los vendedores en la puerta del zoológico transcurrían su sábado como cualquier otro y los paseantes en la Rural misma no tenían muy claro el peso de lo que estaba por pasar. Pero adentro no, adentro era distinto. Adentro de la pista se habían ajustado cinchas con un cuidado diferente.\n\nEste año tuvo una cuota diferente, con un desfile seguido del Himno Nacional para darle el marco correspondiente a un evento como este. Con Gonzalo Nievas portando la bandera nacional, como campeón defensor de la categoría.\n\nPor lo tanto, y para los que ya se olvidaron: MAÑANERO PERICO con la monta de Nico Moreno y 54 puntos totales son los Campeones Nacionales de Rienda FZB categoría A de la temporada 2024-2025.\n\nSegundos, DEL YARETAL PICHICIEGO con Gonzalo Nievas a nada más que medio punto completando 53.5\n\nTerceros MAÑANERA MAESTRA con Poky Moreno y 52 puntos.\n\nAsí de parejito, así de apretado, así de azaroso, ingrato y fascinante es siempre el campeonato de rienda."
            },
            {
                "id": "2025-2026",
                "year": 2026,
                "title": "Final FZB A 2025-2026",
                "location": "Palermo",
                "date": "Marzo 2026",
                "content": "Final FZB A 2025-2026\n\nSiempre que llovió, paró, pero siempre que paró volvió a llover también y llovida sobre mojado encontrábamos la Pista Central de Palermo aquel sábado 28 de marzo que se había enojado a la madrugada y había tirado baldazos de agua en la arena."
            }
        ];

        class Blog {
            constructor() {
                this.articles = articlesData;
                this.view = 'home';
                this.current = null;
                this.query = '';
                this.year = '';
                this.years = [...new Set(this.articles.map(a => a.year))].sort((a,b) => b-a);
                this.render();
            }

            filter() {
                return this.articles.filter(a => {
                    const q = this.query.toLowerCase();
                    const titleMatch = a.title.toLowerCase().includes(q);
                    const contentMatch = a.content.toLowerCase().includes(q);
                    const matches = q === '' || titleMatch || contentMatch;
                    const year_match = this.year === '' || a.year.toString() === this.year;
                    return matches && year_match;
                }).sort((a,b) => b.year - a.year);
            }

            render() {
                const app = document.getElementById('app');
                if (this.view === 'article') {
                    const a = this.articles.find(x => x.id === this.current);
                    if (!a) return;
                    app.innerHTML = `<div class="container"><button class="back-btn" onclick="blog.goHome()">← Volver</button><h1>${a.title}</h1><div class="article-view-meta"><span>${a.location}</span><span>${a.date}</span></div><div class="article-view-content">${a.content.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div></div>`;
                } else if (this.query === '' && this.year === '') {
                    app.innerHTML = `<div class="home-header"><h1>Notas Criollas</h1><div class="search-box"><input type="text" class="search-input" id="search" placeholder="Buscar por palabra clave, año o tema..." autocomplete="off"/><div class="suggestions" id="suggestions"></div></div></div>`;
                    this.setupSearch();
                } else {
                    const filtered = this.filter();
                    app.innerHTML = `<div class="container"><div class="filters"><div class="search-control"><input type="text" class="search-input" id="search" placeholder="Buscar..." value="${this.query}" autocomplete="off"/><div class="suggestions" id="suggestions"></div></div><select class="filter-select" onchange="blog.year=this.value;blog.render()"><option value="">Todos los años</option>${this.years.map(y => `<option value="${y}" ${this.year===y.toString()?'selected':''}>${y}</option>`).join('')}</select><button class="clear-btn" onclick="blog.query='';blog.year='';blog.render()">Limpiar</button></div><div class="results-info">${filtered.length} artículo${filtered.length!==1?'s':''}</div><div class="articles-grid">${filtered.length > 0 ? filtered.map(a => `<div class="article-card" onclick="blog.view='article';blog.current='${a.id}';blog.render()"><div class="article-card-title"><span>${a.title}</span><span class="article-card-year">${a.year}</span></div><div class="article-card-meta">${a.location} • ${a.date}</div></div>`).join('') : '<div class="empty-state">No se encontraron artículos.</div>'}</div></div>`;
                    this.setupSearch();
                }
            }

            setupSearch() {
                const input = document.getElementById('search');
                if (!input) return;
                
                input.addEventListener('input', (e) => {
                    this.query = e.target.value;
                    const suggestions = document.getElementById('suggestions');
                    if (this.query.length > 1) {
                        const matches = this.articles.filter(a => 
                            a.title.toLowerCase().includes(this.query.toLowerCase()) ||
                            a.content.toLowerCase().includes(this.query.toLowerCase())
                        );
                        if (matches.length > 0) {
                            suggestions.classList.add('active');
                            suggestions.innerHTML = matches.slice(0, 5).map(a => `<div class="suggestion-item" onclick="blog.current='${a.id}';blog.view='article';blog.query='';blog.year='';blog.render()">${a.title}</div>`).join('');
                        } else {
                            suggestions.classList.remove('active');
                        }
                    } else {
                        suggestions.classList.remove('active');
                    }
                });

                input.addEventListener('blur', () => {
                    setTimeout(() => {
                        const sug = document.getElementById('suggestions');
                        if (sug) sug.classList.remove('active');
                    }, 200);
                });
                
                input.focus();
            }

            goHome() {
                this.view = 'home';
                this.current = null;
                this.query = '';
                this.year = '';
                this.render();
            }
        }

        const blog = new Blog();
    </script>
</body>
</html>
