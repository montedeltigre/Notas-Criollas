<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rienda - Blog de notas</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #fafafa; color: #1a1a1a; }
        .container { max-width: 900px; margin: 0 auto; padding: 2rem; }
        .home-header { text-align: center; padding: 4rem 2rem 2rem; }
        .home-header h1 { font-size: 24px; font-weight: 400; color: #666; margin-bottom: 2rem; }
        .search-box { width: 100%; max-width: 500px; margin: 0 auto; position: relative; }
        .search-input { width: 100%; padding: 12px 16px; font-size: 16px; border: 1px solid #ddd; border-radius: 6px; }
        .search-input:focus { outline: none; border-color: #999; box-shadow: 0 0 0 3px rgba(0,0,0,0.05); }
        .suggestions { position: absolute; top: 100%; left: 0; right: 0; background: white; border: 1px solid #ddd; border-top: none; border-radius: 0 0 6px 6px; max-height: 300px; overflow-y: auto; z-index: 10; display: none; }
        .suggestions.active { display: block; }
        .suggestion-item { padding: 8px 16px; cursor: pointer; font-size: 13px; color: #666; border-bottom: 1px solid #f0f0f0; }
        .suggestion-item:hover { background: #f5f5f5; }
        .suggestion-category { padding: 8px 16px; background: #fafafa; font-size: 11px; font-weight: 600; color: #999; text-transform: uppercase; }
        .filters { display: flex; gap: 12px; flex-wrap: wrap; margin: 2rem 0; align-items: center; }
        .search-control { flex: 1; min-width: 250px; position: relative; }
        .filter-select, .clear-btn { padding: 8px 12px; font-size: 14px; border: 1px solid #ddd; border-radius: 6px; background: white; cursor: pointer; }
        .results-info { font-size: 13px; color: #999; margin: 1rem 0; }
        .articles-grid { display: flex; flex-direction: column; gap: 12px; }
        .article-card { padding: 1rem 1.25rem; border: 1px solid #ddd; border-radius: 6px; background: white; cursor: pointer; }
        .article-card:hover { border-color: #999; background: #f9f9f9; }
        .article-card-title { font-size: 15px; font-weight: 500; color: #1a1a1a; margin-bottom: 0.5rem; display: flex; justify-content: space-between; }
        .article-card-year { font-size: 13px; color: #999; }
        .article-card-meta { font-size: 13px; color: #999; margin-bottom: 0.75rem; }
        .article-card-champion { font-size: 12px; color: #666; font-weight: 500; }
        .back-btn { padding: 8px 12px; font-size: 14px; border: 1px solid #ddd; background: white; border-radius: 6px; cursor: pointer; margin-bottom: 1.5rem; }
        .article-view h1 { font-size: 28px; margin-bottom: 0.5rem; }
        .article-view-meta { display: flex; gap: 1.5rem; margin-bottom: 2rem; font-size: 13px; color: #999; }
        .article-view-champion { background: #f5f5f5; padding: 1rem 1.25rem; border-radius: 6px; margin-bottom: 2rem; font-size: 14px; border-left: 3px solid #1a1a1a; }
        .article-view-content { line-height: 1.8; color: #1a1a1a; font-size: 15px; white-space: pre-wrap; word-wrap: break-word; }
        .empty-state { text-align: center; padding: 2rem; color: #999; }
    </style>
</head>
<body>
    <div id="app"></div>
    <script>
const articles = [
{id:'2025-2026',year:2026,title:'Final FZB A 2025-2026',location:'Palermo',date:'Marzo 2025',jockeys:['Nico Moreno','Gonzalo Nievas','Joaquín Crespo','Juan Aveiro'],horses:['Mañanero Perico','Del Siete Justicia','Tinajera Mojinete','Cañumil Nazareno'],champion:'Nico Moreno - Mañanero Perico (53.5 pts) - BICAMPEÓN',content:'Siempre que llovió, paró, pero siempre que paró volvió a llover también y llovida sobre mojado encontrábamos la Pista Central de Palermo aquel sábado 28 de marzo que se había enojado a la madrugada y había tirado baldazos de agua en la arena.\n\nTodo el mundo adentro porque estaba imposible, a reacomodar los horarios para entreverarse en un cronograma por demás apretado, y a la pista las banderas y el himno que se venía la Final de la Rienda, el día de todos los días, el sueño de tantos, el logro de pocos.\n\nLos 14 participantes formados en calma tensa, la emoción protocolar de la Canción Patria y los jurados, ambos debutantes en esta instancia, Felipe Wayar y Tomás Kehoe, listos para evaluar lo que íbamos a ver en la pista.\n\nArrancaba Chiara Piccirelli con su muy linda gateada Cruz Diablo La Ansiosa. En la rayada iba a tener un par de complicaciones también y, más allá de la fraqueza para parar, se iba a dejar también unos puntos ahí que ya no iba a poder remontar en el resto de la prueba. 39 en el total y la mirada ya puesta en la próxima temporada.'},
{id:'2024-2025',year:2025,title:'Final Nacional FZB categoría A - 2024 / 2025',location:'Palermo (Rural)',date:'Febrero 2025',jockeys:['Nico Moreno','Gonzalo Nievas','Poky Moreno'],horses:['Mañanero Perico','Del Yaretal Pichiciego','Mañanera Maestra'],champion:'Nico Moreno - Mañanero Perico (54 pts)',content:'Afuera era un día más. El 37 pasaba por Sarmiento, los vendedores en la puerta del zoológico transcurrían su sábado como cualquier otro y los paseantes en la Rural misma no tenían muy claro el peso de lo que estaba por pasar. Pero adentro no, adentro era distinto.\n\nEra la Final de la Rienda, era el día más importante de todos los días. Había 13 binomios listos para sacarse los ojos en la Central de Palermo que aparecía perfecta, invitando a ser trajinada abajo de un cielo diáfano. Estaba, como nunca, todo dado.'},
{id:'2024',year:2024,title:'Final FZB categoría A 2024',location:'Palermo',date:'Febrero 2024',jockeys:['Gonzalo Nievas','Nico Moreno','Pedrín Muñoz'],horses:['Luz Buena Agarrate Villa Seca','Repecho Macoco','Matute Ayacucho El Chacal'],champion:'Gonzalo Nievas - Luz Buena Agarrate Villa Seca (53 pts en desempate)',content:'Es un día de otoño en 2006 y un hombre de chaleco de carpincho y chupalla deja la pista central de Palermo después de haber obtenido el Campeonato Nacional de Rienda categoría A. Dieciocho años después exactos, el mismo hombre vuelve a dejar esa pista habiendo obtenido el campeonato con otro caballo de su cría.'},
{id:'2023',year:2023,title:'Final Nacional FZB Categoría A 2023',location:'Palermo',date:'Octubre 2023',jockeys:['María Fe de Battista','Pedrín Muñoz','Nico Moreno'],horses:['Arraigado Desterrada','Gualta Presumida','Beravebú Patrón'],champion:'María Fe de Battista - Arraigado Desterrada (51.5 pts) - PRIMERA MUJER CAMPEONA',content:'La rienda, territorio para las sorpresas. Todos los años nos acomodamos alrededor de una pista de arena con la certeza de que muchas cosas van a pasar, y que no sabemos cuáles ni en qué orden.'},
{id:'2022',year:2022,title:'Final Nacional FZB Categoría A 2022',location:'Jesús María',date:'Noviembre 2022',jockeys:['Pedrín Muñoz','Gonzalo Nievas'],horses:['Gualta Presumida','Matute Ayacucho El Chacal'],champion:'Pedrín Muñoz - Gualta Presumida (55 pts)',content:'El día gris no combinaba con la expectativa. La final de la rienda volvía a Jesús María, volvía a hacerse en la fecha habitual.'},
{id:'2021',year:2021,title:'Final Nacional FZB Categoría A 2021',location:'Mendoza',date:'Agosto 2021',jockeys:['Gonzalo Nievas','Anita de Battista','Pedrín Muñoz'],horses:['Matute Ayacucho El Chacal','Tinajera El Jefe','Cinco Lunas Picardía'],champion:'Gonzalo Nievas - Matute Ayacucho El Chacal (52 puntos)',content:'El lugar, esta vez, era Mendoza. Toda la Rienda del país se había convocado en un cónclave ultraintenso que nos llenó de caballos por varios días.'},
{id:'2020',year:2020,title:'Final Nacional FZB Categoría A 2020',location:'La República',date:'Febrero 2020',jockeys:['Gonzalo Nievas','Carlos Sánchez'],horses:['Leñador','Cimbronazo La Gallega'],champion:'Gonzalo Nievas - Matute Ayacucho El Chacal (52 puntos)',content:'El lugar era La República y el calor de febrero transparaba los barbijos obligatorios de todos los concurrentes.'},
{id:'2019',year:2019,title:'FZB A 2019',location:'Palermo',date:'Marzo 2019',jockeys:['Gonzalo Nievas','Marcos Nievas','Poky Moreno'],horses:['Luz Buena Agarrate Villa Seca','Tinajera Buena Moza','La Cadrila'],champion:'Gonzalo Nievas - Luz Buena Agarrate Villa Seca (45.5 pts)',content:'Un puñado de jinetes amanece antes de que levante el rocío y ensilla hacia la improbable idea de estar 10 minutos de un día en la pista de Palermo.'},
{id:'2018',year:2018,title:'FZB A 2018',location:'Palermo',date:'Marzo 2018',jockeys:['Gonzalo Nievas','Pedrín Muñoz'],horses:['Matute Ayacucho El Chacal','Luz Buena Agarrate Villa Seca'],champion:'Gonzalo Nievas - Matute Ayacucho El Chacal (52-53 pts)',content:'La Pistilla entra a la pista y una atracción inevitable te obliga a mirarla.'},
{id:'2017',year:2017,title:'FZB A 2017',location:'Palermo',date:'Marzo 2017',jockeys:['Pedrín Muñoz','Nico Moreno'],horses:['Gualta Presumida','Dormida Pichita'],champion:'Pedrín Muñoz',content:'El histórico Pedrín Muñoz y la yegua Gualta Presumida se enfrentaban en esta final.'},
{id:'2016',year:2016,title:'FZB A 2016',location:'Palermo',date:'Marzo 2016',jockeys:['Pedrín Muñoz','Gonzalo Nievas'],horses:['Del Yaretal Clotilde','Luz Buena Agarrate Villa Seca'],champion:'Pedrín Muñoz - Del Yaretal Clotilde',content:'Final de la Felipe Z. Ballester A. Pedrín Muñoz se llevó el campeonato nacional.'},
{id:'2014',year:2014,title:'FZB A 2014',location:'Palermo (Rural)',date:'Febrero 2014',jockeys:['Pedrín Muñoz','Gonzalo Nievas'],horses:['Vilcún Chuquisaca','Luz Buena Agarrate Villa Seca'],champion:'Vilcún Chuquisaca - Pedrín Muñoz (49.5 pts) - BICAMPEONA',content:'Vilcún Chuquisaca, la bicampeona de la rienda que defendería su título.'},
{id:'2013',year:2013,title:'Final Nacional FZB Categoría B 2013 + Artículos',location:'Palermo',date:'Marzo 2013',jockeys:['Nico Fazio','Luciano Bustos','Carlos Sánchez'],horses:['La Beatrices','Compariel Corría','Del Siete Justiciara'],champion:'La Beatrices - Nico Fazio',content:'La rienda es esperar. La rienda es ingrata porque dura muy poco pero porque sale o te vas a la casa.'},
{id:'2012',year:2012,title:'Final Nacional FZB Categoría A 2012',location:'Palermo',date:'Marzo 2012',jockeys:['Pablo Sánchez','Pedro Muñoz','Gonzalo Nievas'],horses:['Vista Volcán Verijero','Tinajera Miralejos','Dormida Pistilla'],champion:'Pablo Sánchez - Vista Volcán Verijero (54.5 pts)',content:'Afuera la ciudad seguía. El estrendo de esa bestia enorme que es Buenos Aires se repetía.'},
{id:'2011',year:2011,title:'Final Nacional FZB Categoría A 2011',location:'Palermo',date:'Abril 2011',jockeys:['Pablo Sánchez','Pedrín Muñoz','Gonzalo Nievas'],horses:['Vista Volcán Verijero','Tinajera Miralejos','Dormida Pistilla'],champion:'Pablo Sánchez - Vista Volcán Verijero (54.5 pts)',content:'47ª EXPOSICIÓN DE OTOÑO 2011. Si hay un momento que todo aquel que por la FZB espera con anisias es la Final Nacional de la Categoría A.'}
];

class RiendaBlog{constructor(){this.articles=articles;this.currentView='home';this.currentArticle=null;this.query='';this.filters={year:'',jockey:'',horse:'',location:''};this.initSuggestions();this.render()}initSuggestions(){const years=new Set(),jockeys=new Set(),horses=new Set(),locations=new Set();this.articles.forEach(a=>{years.add(a.year);locations.add(a.location);a.jockeys.forEach(j=>jockeys.add(j));a.horses.forEach(h=>horses.add(h))});this.suggestions={years:Array.from(years).sort((a,b)=>b-a),jockeys:Array.from(jockeys).sort(),horses:Array.from(horses).sort(),locations:Array.from(locations).sort()}}getFilteredArticles(){return this.articles.filter(article=>{const matchesQuery=!this.query||article.title.toLowerCase().includes(this.query.toLowerCase())||article.content.toLowerCase().includes(this.query.toLowerCase())||article.jockeys.some(j=>j.toLowerCase().includes(this.query.toLowerCase()))||article.horses.some(h=>h.toLowerCase().includes(this.query.toLowerCase()));const matchesYear=!this.filters.year||article.year.toString()===this.filters.year;const matchesJockey=!this.filters.jockey||article.jockeys.includes(this.filters.jockey);const matchesHorse=!this.filters.horse||article.horses.includes(this.filters.horse);const matchesLocation=!this.filters.location||article.location===this.filters.location;return matchesQuery&&matchesYear&&matchesJockey&&matchesHorse&&matchesLocation}).sort((a,b)=>b.year-a.year)}getSuggestions(){if(this.query.length<2)return[];const q=this.query.toLowerCase(),suggestions=[],matchingJockeys=this.suggestions.jockeys.filter(j=>j.toLowerCase().includes(q)),matchingHorses=this.suggestions.horses.filter(h=>h.toLowerCase().includes(q)),matchingArticles=this.articles.filter(a=>a.title.toLowerCase().includes(q));if(matchingJockeys.length>0){suggestions.push({type:'category',text:'Jinetes'});matchingJockeys.slice(0,5).forEach(j=>{suggestions.push({type:'jockey',text:j})})}if(matchingHorses.length>0){suggestions.push({type:'category',text:'Caballos'});matchingHorses.slice(0,5).forEach(h=>{suggestions.push({type:'horse',text:h})})}if(matchingArticles.length>0){suggestions.push({type:'category',text:'Artículos'});matchingArticles.slice(0,3).forEach(a=>{suggestions.push({type:'article',text:a.title,id:a.id})})}return suggestions}handleSuggestionClick(suggestion){if(suggestion.type==='jockey'){this.filters.jockey=suggestion.text;this.query=''}else if(suggestion.type==='horse'){this.filters.horse=suggestion.text;this.query=''}else if(suggestion.type==='article'){this.currentView='article';this.currentArticle=suggestion.id}this.render()}render(){const app=document.getElementById('app');if(this.currentView==='article'){const article=this.articles.find(a=>a.id===this.currentArticle);app.innerHTML=`<div class="container"><button class="back-btn" onclick="blog.goHome()">← Volver</button><h1>${article.title}</h1><div class="article-view-meta"><span>${article.location}</span><span>${article.date}</span></div><div class="article-view-champion"><strong>Ganador/a:</strong> ${article.champion}</div><div class="article-view-content">${article.content}</div></div>`}else if(!this.query&&!Object.values(this.filters).some(v=>v)){app.innerHTML=`<div class="home-header"><h1>Mis notas</h1><div class="search-box"><input type="text" class="search-input" id="search-input" placeholder="Buscar por año, jinete, caballo, palabra..." autocomplete="off"/><div class="suggestions" id="suggestions"></div></div></div>`;this.setupSearch()}else{const filtered=this.getFilteredArticles();app.innerHTML=`<div class="container"><div class="filters"><div class="search-control"><input type="text" class="search-input" id="search-input" placeholder="Buscar..." value="${this.query}" autocomplete="off"/><div class="suggestions" id="suggestions"></div></div><select class="filter-select" onchange="blog.setFilter('year', this.value)"><option value="">Todos los años</option>${this.suggestions.years.map(y=>`<option value="${y}" ${this.filters.year===y.toString()?'selected':''}>${y}</option>`).join('')}</select><select class="filter-select" onchange="blog.setFilter('jockey', this.value)"><option value="">Todos los jinetes</option>${this.suggestions.jockeys.map(j=>`<option value="${j}" ${this.filters.jockey===j?'selected':''}>${j}</option>`).join('')}</select><select class="filter-select" onchange="blog.setFilter('horse', this.value)"><option value="">Todos los caballos</option>${this.suggestions.horses.map(h=>`<option value="${h}" ${this.filters.horse===h?'selected':''}>${h}</option>`).join('')}</select><select class="filter-select" onchange="blog.setFilter('location', this.value)"><option value="">Todas las ubicaciones</option>${this.suggestions.locations.map(l=>`<option value="${l}" ${this.filters.location===l?'selected':''}>${l}</option>`).join('')}</select><button class="clear-btn" onclick="blog.clearFilters()">Limpiar</button></div><div class="results-info">${filtered.length} artículo${filtered.length!==1?'s':''}</div><div class="articles-grid">${filtered.length>0?filtered.map(a=>`<div class="article-card" onclick="blog.viewArticle('${a.id}')"><div class="article-card-title"><span>${a.title}</span><span class="article-card-year">${a.year}</span></div><div class="article-card-meta">${a.location} • ${a.date}</div><div class="article-card-champion">${a.champion}</div></div>`).join(''):'<div class="empty-state">No se encontraron artículos.</div>'}</div></div>`;this.setupSearch()}}setupSearch(){const input=document.getElementById('search-input');if(!input)return;input.addEventListener('input',e=>{this.query=e.target.value;const suggestions=this.getSuggestions(),suggestionsContainer=document.getElementById('suggestions');if(suggestions.length>0&&e.target.value.length>0){suggestionsContainer.classList.add('active');suggestionsContainer.innerHTML=suggestions.map(s=>s.type==='category'?`<div class="suggestion-category">${s.text}</div>`:`<div class="suggestion-item" onclick="blog.handleSuggestionClick(${JSON.stringify(s).replace(/"/g,'&quot;')})">${s.text}</div>`).join('')}else{suggestionsContainer.classList.remove('active')}});input.focus()}setFilter(key,value){this.filters[key]=value;this.render()}clearFilters(){this.query='';this.filters={year:'',jockey:'',horse:'',location:''};this.render()}viewArticle(id){this.currentView='article';this.currentArticle=id;this.render()}goHome(){this.currentView='home';this.currentArticle=null;this.query='';this.filters={year:'',jockey:'',horse:'',location:''};this.render()}}
const blog=new RiendaBlog();
    </script>
</body>
</html>
