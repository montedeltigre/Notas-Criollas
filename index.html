        const articlesData = [
            {"id":"2011","year":2011,"title":"Final Nacional FZB Categoría A 2011","location":"Palermo","date":"Noviembre 2011","content":"Si hay un momento que todo aquel que por la FZB espera con ansias es la Final Nacional de la Categoría A. El lugar es siempre el mismo: Palermo o la Rural de Palermo, el entusiasmo también y las pruebas en general no varían mucho. Se acercaba la final de la rienda, ese momento único donde los mejores jinetes del mundo criollista se reúnen a ver de qué están hechos."},
            {"id":"2012","year":2012,"title":"Final Nacional FZB Categoría A 2012","location":"Palermo","date":"Marzo 2012","content":"PREMIO PRESIDENTE FELIPE Z. BALLESTER - CATEGORÍA \"A\" - 2012\n\nAfuera la ciudad seguía. El estruendo de esa bestia enorme que es Buenos Aires se repetía como cada día, ignorante de lo que estaba ocurriendo dentro del predio de La Rural. Afuera los colectivos tocaban bocina, las madres retaban a sus hijos y los vendedores ambulantes vociferaban sus precios. Adentro se ajustaban cinchas, se revisaban frenos, se flexionaban músculos, se echaban rezos. Se acercaba la final de la rienda, ese momento único donde los mejores jinetes del mundo criollista se reúnen a ver de qué están hechos, a competir contra sus pares, contra el público, contra ellos mismos. A poner el alma en esos siete minutos eternos y efímeros donde pueden pasar tantas cosas que a veces se confunde el mérito de un logro con una mera lotería.\n\nA eso venían todos los jinetes, contra esto se enfrentaban. Ocho hombres, ocho mendocinos en este caso, que entraban a la cubierta de Palermo con el pecho hinchado de orgullo para disimular la tensión. Ocho hombres que venían a refrendar lo hecho en Feriagro, a demostrar que no había sido casualidad.\n\nMarcial metió la mano en el sombrero y la cara se le desfiguró en una mueca de bronca que revelaba que había sacado el papelito con el número 1, aunque intentara disimularlo forzando una media sonrisa. El alivio aflojó el gesto de los demás competidores que confirmaron que por lo menos no entraban primeros. No había más que hablar, no había más prolegómenos, segundos afuera, Marcialito queda en pista y a ver qué pasa. Empieza la final.\n\nMiquicho El Serranito es el caballo. Un bayo potente e impetuoso que no puede disimular la tensión que él también sufre y nunca suelta los andares que son pagados con 4 puntos y lo dejan en una posición difícil de remontar. Marcial lo conduce con destreza y mucha violencia, demostrando valentía y ganas de estar arriba, pero esos andares flojos y un cero en el desmontar y montar lo dejan con 40 puntos y medio y demasiado dependiente de lo que hagan los demás para decidir su posición final.\n\nEntra a la pista una de las vedettes de la final del año pasado. Dormida Pistilla, reservada campeona 2011, con la monta de Gonzalo Nievas en su segundo año en la A, que tranqueaba firme y de orejas paradas hacia los jurados para el saludo inicial, con su jinete sacando pecho y mirando al frente, altivo, consciente del momento que estaba viviendo y dispuesto a estar a la altura de las circunstancias. La yegua también parecía estar al tanto de lo que se jugaba y arrancó los andares paseando su elegancia como seduciendo, mezclándola con potencia y agilidad. Ocho puntos para ella y la cosa que se ponía seria. Unas entradas de patas bastante malas, que provocaron el fastidio del jinete para con esa pista imdonable, le significaron solamente 4 y medio y la necesidad de sumar en los circulares, su punto fuerte. La troya fue, como en Mendoza, una sinfonía. Una demostración perfecta de la precisión en velocidad sustentada en la agilidad y la fuerza. Una troya que se pagó 7 y medio porque la entrega fue desprolija y, quizás, por alguna cosita en la cadencia, pero qué deleite. Como el ocho, también, donde sacó ocho y medio para terminar de solucionar los problemas de la rayada y empezar a sumar puntos serios. Dos seis en el volapié y la vuelta sobre las patas más un cinco en el retroceso la ponían en buena posición pero lo que la dejó muy bien parada fue cobrar los cuatro puntos del desmontar y montar que volverían a ser definitorios, como siempre. 49 y medio, el puntaje fijado y ahora que vengan los otros y lo superen.\n\nRaúl González nos dejó sin la posibilidad de ver al Huasuncho defender por segunda vez su título pero traía a cambio a su propia hermana, la preciosa Guampa Chismosa que venía a defender el nombre de su hermano y que empezó muy bien con unos andares correctos y una rayada de manual que le significaron 6 y 8 puntos respectivamente, pero luego no pudo marcar puntos fuertes en los tres movimientos siguientes y si bien hizo los 4 del desmontar y montar y un retroceso de 5 y medio, quedó con 46 y medio y con demasiados caballos buenos todavía por venir como para aguantar con ese puntaje.\n\nSi bien había habido puntajes respetables, el promedio venía muy por debajo de lo que se había visto en Mendoza. Y esas situaciones a Marcos Nievas no se le escapan. Viejo zorro, soldado de mil batallas, competidor frío, calculador y preciso sabía que tenía su oportunidad, sentía que la historia, esta vez, le estaba abriendo una puerta y que tenía yegua para aprovecharlo. 6 y medio, 7, 8 y 7 y medio en los primeros 4 movimientos para quedar primero en el parcial de esos cuatro y las sonrisas maliciosas que empezaban a aflorar en la tribuna, se notaba que el viejo, el máximo campeón en actividad, había olido sangre. 4 y medio en el volapié destrozaron todas sus posibilidades. Después una vuelta sobre las patas donde la yegua tuvo algún problema a una mano y otros 4 y medio lo despidieron para siempre de los puestos altos de esta final. Terminó con 46 y con la sensación amarga de eso que pudo haber sido.\n\nCricao Malal Chilenera era la yegua que seguía en el orden. Pedrín Muñoz, a quien todos ansiábamos ver montando el Miralejos, venía enhorquetado con la tranquilidad que lo caracteriza. La yegua hizo todo correcto, más algún puntaje destacado como los 8 en la rayada, terminaron significándole 48 puntos y medio que la pusieron solo uno por debajo de la Pistilla y los murmullos que empezaban a escucharse porque quizás teníamos sorpresa.\n\nQuedaban tres participantes, entre ellos los clasificados primero y segundo en Feriagro. Venía a pista Del Siete Justiciera, la elegante baya ruana de la República, segunda en la semi y montada por Cacho Ampuero, ese minúsculo gran jinete que parece un jockey y que hace temblar el piso cuando entra a pista. La Justiciera empezó con 7 en los andares y perdió puntos en la rayada consiguiendo solamente 5, pero se reivindicó con una troya de 8 que le dieron algo de oxígeno. De lo que faltaba, solamente 8 en la vuelta sobre las patas y 6 en el retroceso, después fue poco en el volapié y el ocho y cero en el embrujado desmontar y montar para terminar con 46, despedirse del sueño del primer puesto y dejarnos con gusto a poco pero con la certeza de que tiene mucho más para dar escondido entre las patas. Esperamos la FICCC ansiosos de verla desplegarse entera.\n\nLlegaba el momento más esperado de la tarde. Entraba a pista Pedrín Muñoz con Tinajera Miralejos, el crack que había dejado así de chiquita la pista de Feriagro hacía dos meses y que llegaba a su primer final de Palermo con la presión de demostrar acá lo que había demostrado allá. Tarea nada fácil. Arrancó con unos andares correctos que se pagaron 7 y medio y decepcionó en la rayada, donde todos queríamos ver algo similar al 10 de Feriagro y tuvimos que conformarnos con un 5. Pero el Miralejos estaba calentando motores, nomás. 9 puntos en una troya que no me voy a poner a describir porque no puedo ponerme a escribir toda esa cantidad de adjetivos. Mirenlá, está el video. Sublime. Ocho puntos y medio en el ocho para demostrar que estaba de vuelta, que era lo que habíamos venido a ver, que lo de Mendoza no había sido casualidad y que esta prueba se la comía.\n\nYo no me acuerdo cuando fue la última vez que se pagó 9 y medio un volapié. Perdón, yo no sé si alguna vez se pagó todo eso un volapié. Había que verlo atropellar en toda la furia, desesperado por llegar a la otra punta como si ahí estuviera la base del arco iris, la Tierra prometida, un tacho de avena. Atropellar ciego hacia la punta para clavar las patas venciendo las leyes de la física y vencer el horror de la pista y volver en un solo movimiento hacia el otro lado como si todo aquello que creía buscar antes, ahora se lo hubieran cambiado de lugar. Así tres veces. Tres veces potente, tres veces fluído, tres veces preciso. La enorme cantidad de público que le hacía justicia al carácter del evento que se desarrollaba era un solo grito para alabar al Miralejos, casi coronándolo campeón de antemano, con las ansias típicas del espectador.\n\nRepasemos. Venía como favorito, primer clasificado, revelación de la temporada y metía 7,5; 5; 9; 8,5; 9,5 y 8. Y el caballo entero como si recién saliera del box. Qué te digo que si no era Pedrín el que estaba arriba, no le aguantaba esa vuelta sobre las patas a la mano izquierda. Pero, muchachas, muchachos, la rienda no se define hasta que el último jinete se saca el sombrero y saluda al jurado. Siempre puede pasar algo, siempre hay una hendija por donde el diablo puede meter la cola. Y el Miralejos se desconcentró y se tiró unos pasos en el desmontar y montar para quedar con un cero en ese movimiento que dolió como si el cero se hubiera marcado a fuego y generó el lamento unánime y espontáneo de la concurrencia que ya lo había consagrado como su favorito y que ahora dudaba. Pedrín, dando una clase de temple y coraje, se recuperó y le clavó 6 al retroceso tratando de no desperdiciar ni medio punto y completando 53,5 que lo dejaban primero lejos hasta ese momento.\n\nMientras, Pablo Sánchez tranqueaba. Me contó que cuando se enteró que iba último se relajó totalmente y decidió que no iba a mirar la prueba, que se iba a concentrar en lo suyo. Tenía un caballo que le gustaba y se tenía toda la fe del mundo. Pero toda, eh. Si estaba relajado por ser último, se terminó de relajar del todo cuando escuchó el cero del Miralejos. Y ahí, viejo zorro él también, olió sangre y supo que esta era su oportunidad y que se la iban a tener que sacar con Gendarmería.\n\nSe plantó en el lugar designado y arrancó unos andares que cobró con 7 y medio, igual que el Miralejos. En la rayada ya le sacó dos puntos, metió siete y se empezó a perfilar, de a poquito. Pero la troya del Miralejos había sido insuperable y Pablo llevó al Verijero a meter 6 puntos y medio que le complicaban las cuentas y en el ocho perdía otro punto respecto del ocho de Pedrín. Para colmo perdía otro punto y medio más en el volapié, donde el Verijero se entregó por completo pero logró solamente 8 puntos, igual que en la vuelta sobre las patas. Todo se reducía al desmontar y montar. El Verijero había estado impecable, no se me malinterprete, Pablo lo había conducido con maestría y venía con buenos puntos. Pero la final, la cuestión meramente matemática, los puntos, el triunfo que se le había negado a Pablo por vaya uno a saber qué cantidad de años, esa cuestión tan mínima y tan inmensa se reducía al desmontar y montar. Porque venía 3 puntos y medio abajo y ahí podía recuperar 4. Así de simple, así de ingrato, así de minúsculo, así de trascendente.\n\nChe, mirá si lo gana Pablito. Ojo que está 3 y medio abajo, nomás. ¿Cómo? Sí, si hace 10 entre los dos próximos ejercicios es Campeón Nacional. Apa. La tensión cayó como un mazazo que enmudeció a toda la pista. El único que no se enteró fue Pablo que, como si estuviera en el campo, paró el picazo enfrente del jurado, ladeó un poco el cuerpo con elegancia y con la solemnidad que lo caracteriza y se bajó prácticamente de un salto como si se le hubiera caído el pañuelo, con la absoluta certeza de que el Verijero no se iba a ir a ningún lado. Dio la vuelta, agarró la rienda, la revoleó por arriba del cogote de su pingo, metió la pata en el estribo y montó como si el caballo estuviera hipnotizado. 4 puntos y hermano hace cuentas que Pablito si clava 6 se gana la Rienda y tenemos que cerrar la Rural y ponerle su nombre. Ojo, no era fácil, había que hacer puntaje perfecto en el retroceso.\n\nSeis puntos para el ejercicio, Pablo que se saca el sombrero y Roberto Cerutti, con toda lucidez, anuncia que el jinete que está en pista, con 54 puntos es el nuevo Campeón Nacional de Rienda temporada 2011-2012. Me acuerdo y se me pone la piel de gallina.\n\nEl resultado final quedó así:\n1. Pablo Sánchez -- Vista Volcán Verijero -- 54,5 pts\n2. Pedro Muñoz -- Tinajera Miralejos -- 53,5 pts\n3. Gonzalo Nievas -- Dormida Pistilla -- 49,5 pts\n4. Pedro Muñoz -- Cricao Malal Chilenera -- 48,5 pts\n5. Raúl González -- Guampa Chismosa -- 46 pts\n\nEterno jinete de todas las finales, top 3 en cualquier estadística, que veía como el reloj de arena seguía pasando y el premio se le seguía negando. Esta vez se le dio y, como suelen ser estas cosas, se le dio con todos los condimentos de un drama angustiante que se define en el último momento y que tiene a todo el mundo sufriendo. No podía ser de otra manera. Felicitaciones Pablo, la Historia te estaba esperando."},
            {"id":"2013-1","year":2013,"title":"Final Nacional FZB Categoría B 2013","location":"Palermo","date":"Noviembre 2013","content":"PREMIO PRESIDENTE FELIPE Z. BALLESTER - CATEGORÍA \"B\" - 2013\n\nLa rienda es esperar. Esperar que se haga la hora de ensillar, esperar que termine la competencia anterior, esperar que te llamen a pista, esperar que pasen los que van antes que vos. La rienda es esperar y es ingrata porque tenés una sola oportunidad cada vez y porque dura muy poco y porque te sale o te vas a tu casa. Por eso nos gusta. Por eso estaban ahí, ese jueves de marzo, de calor y de cambios de horario los 6 finalistas de la B esperando que terminara la final de la C para poder entrar. Afuera de la pista las miradas resignadas no llegaban a ponerse nerviosas porque faltaba un rato y mejor no andar torturando la cabeza y las tripas antes de tiempo. Hasta que, por fin, llega el momento y ahí sí se endurecen los gestos, se ajustan las cinchas, se tuercen las tripas. Empieza la final nacional de la rienda, categoría B, empieza la verdad, se terminan las excusas para esos 6 tipos que vienen de todo el país a tratar de alcanzar la gloria, de confirmar lo que hicieron en Mendoza, de ascender a la A.\n\nLuciano Bustos entra a pista con todo el peso de su apellido a cuestas, tranqueando firme y liberal en Compañera Cotorra, novedad de esta temporada, presentada por Melisa Verdoljak y criada en los pagos rosarinos. No la tienen fácil, ni la yegua ni el jinete. A la yegua la traiciona su temperamento, demasiado caliente y al jinete le pasan factura los varios años retirado de las pistas y arrancan con 4 puntos en unos andares que no fueron malos pero que tuvieron fallos claros. La rayada, otro problema y un cero en el desmontar y montar iban a volver inútiles los dignos puntajes en el volapié, la troya, el ocho y el retroceso. 30 puntos para ellos y el duro golpe de realidad que significa conocer de primera mano el nivel al que se está compitiendo.\n\nEntraba el Guay Tiento, presentado por la cabaña La Gracia y montado por Máximo Correa Dupuy. Un binomio que demostró por qué había llegado donde llegó y que siembra esperanzas para el futuro pero que al igual que a Luciano Bustos con la Cotorra, la experiencia le jugó una mala pasada, no pudieron hacer los puntos que habían hecho en Mendoza y se volvieron masticando la bronca de esos 29 puntos finales.\n\nLas Beatrices volvían a Palermo después de varios años y venían pidiendo pista. La yegua era la Tinajera Rueca y el jinete era Nico Fazio quién sorprendentemente no estaba estudiando en ese momento. El binomio había causado estragos en la pista de Feriagro, terminando segundo en la semifinal y dejándonos a todos boquiabiertos por la entrega, la prestancia, la emoción, el arte. Pavada de pergaminos tenía que venir a refrendar. Para colmo, para ponernos nerviosos a todos arrancó con un 4 y medio en los andares que lo obligaba a hacer todo lo otro muy bien, sin errores. Pues no fue un problema. Se encargaron de dejar surcos en una rayada a una velocidad que parecía que no iba a poder parar y se encargaron de dibujar dos círculos perfectos en una troya con potencia, con velocidad, con la yegua bien colocada, hilvanaron un ocho que fue un poema y plantaron unos volapiés que decí que Nico es jinete porque en la vuelta del segundo volapié la yegua entendió qué le estaban pidiendo y giró como si estuviera disparando en el campo. Mamita, cómo no se cayó este pibe. 7, 8, 7 y medio, 6 y medio y puntajes perfectos en el desmontar y montar y el retroceso para clavar 43,5 y llanto, emoción, fanfarrias, papelitos y a esperar a ver qué pasaba, porque ahora iban a tener que ganarles.\n\nSeguía Pablo Torralba que aparecía esta vez clasificado en Yancamil Guor, padrillo venido de San Andrés de Giles, domado y arreglado por él mismo, debutado en esta temporada. Entró tranqueador, como nos tiene acostumbrados, e hizo 5, 7, 6 y 5, marcando una regularidad de esas que ilusionan pero un 3 y medio en el volapié lo apartaba de las ilusiones de triunfo y cerraba con 3 y 3 y medio en los dos últimos movimientos para terminar con 33 puntos.\n\nEl Poky Moreno no ganó la final de la B 2011 porque a veces los caballos ven fantasmas, paran las orejas y se van a buscarlos. Y siempre es en el desmontar y montar. Pudo haberse llevado todo aquella vez y tuvo que conformarse con un cuarto puesto. En aquel momento todos nos asombramos de su tranquilidad y de la simpleza con la que manejaba sus caballos. No perdió nada de eso. Extraordinario ganador de la semifinal en Feriagro, llegaba a Palermo con el traje de candidatísimo y todas las luces apuntando sobre él. Nunca transpiró. Entró a pista con la Caruló Inquieta de orejitas paradas y tranco firme, suelto, rítmico, como si estuviera en la casa.\n\nHizo todo bien desde el principio. Arrancó con 7 y medio en los andares y de ahí no largó la punta nunca más. 9 y medio, 7 y medio, 8, 5 y los 10 puntos de rigor en los últimos dos movimientos para cumplir con su tarea, marcar 47 puntos y medio y volver al corral de espera de orejitas paradas y tranco firme, suelto, rítmico, como si estuviera en la casa. ¿Nervios? ¿Por qué?\n\nMientras el público se debatía entre la ovación y el silencio asombrado, entraba a pista el último participante, Julián Gismondi en Ballenera Agua Fuerte, a cerrar la jornada. Lo difícil que es entrar después de una clase como la del Poky no lo amilanó a Julián quien, experimentado, supo lo que tenía que hacer para conseguir los resultados. Una prueba regular, parejita, sin fallos importantes y con un 8 en la troya como nota más destacada lo posicionaron cómodo en el tercer lugar con 37 y medio.\n\nResultados:\n1. Caruló Inquieta, con Alejandro Moreno. 47,5 pts\n2. Tinajera Rueca, con Nicolás Fazio. 43,5 pts\n3. Ballenera Agua Fuerte, con Julián Gismondi. 37,5 pts\n4. Yancamil Guor, con Pablo Torralba. 33 pts\n5. Compañera Cotorra, con Luciano Bustos. 30 pts\n6. Guay Tiento, con Máximo Correa Dupuy. 29 pts\n\nLa rienda siempre paga. A veces hay menos competidores, otras el nivel no llega al esperado, hay veces en que la pista no está a la altura o que los jurados tienen un mal día. Pero siempre, siempre, hay un volapié que te emociona, una troya que te saca del asiento, un caballo que te deja sin aliento. Por eso la seguimos, por eso nos gusta."},
            {"id":"2013-2","year":2013,"title":"Entrevista a Gonzalo Nievas","location":"Luján de Cuyo","date":"2013","content":"ENTREVISTA A GONZALO NIEVAS - \"Me probé a mí mismo que se pueden ganar cosas sin sangres Facón\"\n\nLa Pistilla entra a la pista y una atracción inevitable te obliga a mirarla. Se mueve elegante, como erguida, con las orejitas paradas y orgullosa, seductora, dama sabedora de que todos la miran. Arriba está el otro protagonista de esta historia. Enhorquetado en su montura tapada en carpincho, con las botas haciendo juego y el traje con botones de plata que ya es su marca registrada, entra Gonzalo puño en el muslo dispuesto a confirmar en esta final todo lo que vino anticipando en la temporada. Pero, como siempre, el cuento se corona en Palermo pero empieza mucho antes.\n\nGonzalito, contanos de la Pistilla.\n\nLa yegua se compró en un remate de San Baldomero, fue uno de los últimos productos diseñados por Eduardo Ballester. Es una hija del Chuchoca y la Dormida Fantasía, que es Zapateado en la Forastera, que va al Quizapu Forastero. Estaba de redomona corriente, nomás, y para mostrarla un poco le pusieron un freno de patas largas y la apuraron ahí en el remate. No se destacó mucho, el que se destacó fue el Andrajo, que también se embarcó para Mendoza.\n\n¿Con qué expectativas tomaste la yegua?\n\nLa empecé a trabajar para ver si podía servir para algo, lo que fuera. La llevamos a morfología y la moví en la rienda de la exposición. En una vuelta, vinieron los Bustos a casa y fuimos a ver los caballos que estaba trabajando yo en ese momento. Agarré la Pistilla y le hice una troya de guatana y quedaron los dos impresionados. En esa época yo todavía movía en la B y el Dr. Bustos me dijo que teníamos que moverla, que tenía unas condiciones bárbares y yo le dije que no, que estaba muy nueva que no la había ni arreglado todavía. Me insistieron y la movimos. La yegua estaba tan cruda que le tuve que enseñar a hacer las pruebas antes de arreglarla porque no me daba el tiempo para llegar a la competencia. La moví y quedé con 52 o 53 puntos y ya nunca más bajó de ese puntaje todas las veces que compitió.\n\n¿La yegua ya había demostrado que valía, la empezaste a tratar distinto?\n\nDesde que llegó a casa siempre la traté como una yegua especial. Eso lo aprendí de mi papá, que a los caballos cracks los trata diferente, les da otra importancia. Así que la Pistilla en casa tiene su bozal, su bozalejo, su guatana y su freno que los usa ella y nadie más. Finalmente, desde el año pasado, tiene también su montura exclusiva. Lo que pasa es que ella es como me gustan a mí los caballos para la rienda, mucho más ancha de atrás que de adelante, casi triangular, entonces cuando se vuelca en las troyas y agarra velocidad yo sentía que me chupaba en la montura que tenía porque era de aletas chicas y no me podía tener bien, sentía que me sacaba para adelante. Así que me hice hacer una con las aletas más cuadraditas para poder agarrarme mejor. El problema es que a veces uno se preocupa por su propia comodidad y se olvida un poco de la comodidad del caballo y de lo que necesita cada uno en particular y terminás trabajando varios caballos con una misma montura. Pero cuando empezás a afinar el lápiz te preocupás por cosas como ésta, así que ahora ella tiene su propia montura.\n\n¿Y de ahí ya a Palermo?\n\nClaro. Ese año yo clasifiqué a la final de la B con 3 caballos, la Pistilla, el Sayana Cóndor y la Nochera Artesana. Quedé campeón con la Artesana y empatado en el segundo puesto entre la Pistilla, el Cóndor y el Traga Libros que movía Cristian Aguilera. Fuimos al desempate que creo que fue con los andares y el ocho y quedamos empatados de nuevo así que desempatamos por los puntos de los andares.\n\n¿Vos llegaste a esta final como candidato?\n\nUno no piensa en eso. Piensa en hacer las cosas bien porque vive de ésto. Era una temporada especial porque a la yegua la habíamos sacado de la rienda para probarla en alguna otra prueba y después ya dejarla para madre. Me decían que ya había dado todo, ya había demostrado de lo que era capaz, no tenía más. Yo la peleé a muerte porque sabía que tenía cosas grandes por hacer todavía, es relativamente nueva y le faltaba maduración, sentía que había que darle otra oportunidad. Ahí me di cuenta de que, o la preparaba para moverla en el aparte o me la llevaban al campo a sacarle cría así que no me quedó otra que empezarla a topear. El topeo es muy bueno para la arregladura, es parte de lo que se necesita para tener un caballo terminado y además sirve para despejarle la cabeza a los mancos.\n\n¿Llegaste a correrla en el aparte?\n\nLa corrí en el aparte y nos fue muy bien. Terminamos cuartos con puntaje para estar en la semifinal pero no pasamos porque clasificaban los tres primeros, más allá del puntaje. Parecía una final, había caballos espectaculares, estaba el bayo de Marcial (Miquicho El Serranito, subcampeón nacional de aparte), el padrillo ese que era de don Víctor Esevich que después se murió (Tinajera Campo Lindo), entre otros. No la exigí porque era la primera vez que corría el aparte y no sabía muy bien que estaba haciendo ahí, era todo nuevo para ella.\n\n¿Cómo fue la espera en la pista antes de mover?\n\nEra un día de mucho nerviosismo. El ratito que estuve antes de mover se me bañó en sudor. Ahí entendí lo que decía mi viejo de la conexión con el caballo, que tenía él con la Aguas Claras (Tinajera Aguas Claras, tricampeona nacional de rienda, campeona de rienda FICCC). Entonces empecé a tranquilizarla, le hablé, la fui flexionando un poco y tratando de apretar los botoncitos que yo sé que hay que apretar para que ella se relaje. Para colmo, fui al sorteo y saqué el primero y el último lugar. Decidí empezar por la Pistilla porque cuando tenés con qué hay que mover primero para ponerle presión a los que vienen después, pero la yegua seguía hecha una bola de nervios. Después me contó el Dr. Bustos que él creyó que no iba a poder hacer los andares. Y la verdad es que no había caminado en todo el ratito ese que estuvimos en la pista pero cuando llegue al punto de partida la palmeé y le dije \"bueno, Pistilla, hemos venido acá a mover así que vamos a hacer las cosas bien\". Y si usted ve la filmación la yegua caminó sin problemas.\n\n¿Cómo lograste volver a moverla en la rienda?\n\nAl mes de esto le digo a Luisito Bustos que me dejaran moverla por última vez, yo quería una oportunidad más con la yegua y a ellos les dije que era porque los otros caballos estaban medio nuevos y quería ir a mover también un caballo de punta. Con el cambio de sistema de entrenamiento la yegua había mejorado muchísimo, la moví y quedé primero en el ránking. Ésa fue mi estrategia, mover fuerte para quedar primero en el ránking y así poder mover último en la semifinal que es lo que a mí me gusta y que creo que te da más posibilidades de clasificar. Era una apuesta complicada, no podía fallar porque todo lo que pasara con la yegua ya era responsabilidad mía.\n\nContanos de la final.\n\nEl día de la final estaba con la mente totalmente en blanco para tratar de calmar la ansiedad y los nervios, que siempre están pero que hay que aprender a controlarlos. Tuve la mala suerte de que entré a la pista por primera vez el día mismo de la prueba, así que la Pistilla estaba muy nerviosa por la gente y el clima que había. ¡Si en ese ratito que estuve antes de mover se me bañó en sudor!\n\n¿Cómo te sentiste durante la prueba en sí?\n\nLa yegua me dio todo lo que le pedí. En la troya y en el ocho yo creo que cometí un error por buscar la máxima velocidad posible, dejando de lado un poco la corrección y por eso me salieron medio grandes y no me las pagaron tanto como me las pagan siempre, la Pistilla no baja de 8 en los circulares y esta vez perdí algunos puntos ahí. El volapié siempre fue un tema con ella. La primera vez que la moví en Palermo la entré muy fuerte porque quería ganar y yo creo que la quemé. Entonces la yegua, si bien había mejorado un poco, en Palermo siempre se me acobardaba. Pero no podía ser que no mejorara. Ya había perdido un campeonato una vez por eso y ahora había perdido puntos en las circulares, si quería ganar necesitaba los puntos del volapié. No tenía problemas para entrar las patas y volver, el tema era la atropellada. Lo que hice fue tratar de largarla más, la saqué fuerte y no le di mucho tiempo a pensar qué estaba pasando. Y me pagaron 9 puntos. Ahí sentí un alivio muy grande porque se notó el esfuerzo y la dedicación que uno pone en el trabajo que es lo que uno busca que se vea. Porque ganar es cuestión de suerte, lo que perdura es el trabajo hecho.\n\n¿Qué te dijo tu viejo?\n\nMi viejo lamentablemente no estuvo en Palermo ese día. No tenía caballos clasificados y cuando es así siempre tratamos de que quede uno en la casa ocupándose de los caballos que quedan, no los podemos desatender. Después pude hablar, para él fue un orgullo que yo haya salido campeón. Más que un orgullo, un sueño cumplido por dedicarnos los dos a lo mismo y por demostrar que lo que hacemos está bien hecho y que se pueden conseguir campeonatos sin tener sangres Facón.\n\n¿Qué significa para vos este campeonato?\n\nAl dedicarse a trabajar caballos, el sueño es éste. Lograr destacarse en una yegua que uno elige y quiere. Yo hace unos años decidí abrirme por mi cuenta y dejar de trabajarle caballos a Don Víctor Esevich. Eso me trajo muchísimas peleas con mi papá, muchas discusiones y momentos complicados. Entonces, un poco para probarme algo a mí mismo, pensé que me gustaría salir campeón con un caballo que no tuviera nada de Facón. Y lo logré con esta yegüita, que tiene tanto corazón que al final es más el corazón que sus condiciones. Al principio la Pistilla venía descartada, siempre se la valoró en menos. Yo sabía que había que darle tiempo, que iba a andar. Lo que traté mucho es de entablar una relación con ella, conectarme. La conexión con los Chuchoca no es fácil de lograr pero una vez que la conseguís te entregan todo.\n\n¿Cómo sigue la vida de la campeona ahora?\n\nLa Pistilla ya es famosa acá. Es la regalona de Luján de Cuyo, es más conocida que yo. A veces voy a Luján y la gente me pregunta por ella, todos quieren saber cómo está. Por ahora está de vacaciones de lujo, la largo en un piquetito, la saco a tranquear de tiro, aprovecho para ir asentándole la enfrenadura porque un caballo nunca se termina de hacer del todo. Veremos que dicen los dueños, si iremos a defender el campeonato o no. Ojalá que sí, Gonzalo. Ojalá que sí."},
            {"id":"2013-3","year":2013,"title":"Cabalgata de Criadores","location":"Varias locaciones","date":"Febrero 2013","content":"CABALGATA DE CRIADORES\n\nCompetir un criollo hoy es correr en Fórmula 1. Cuidados extremos, vendas, cremas, inyecciones, suplementos, planes de entrenamiento, mantas y boxes. Cuidados necesarios para caballos de elite, ultrapreparados que tienen que desempeñar su actividad en la pista, rayando o apretando vacas, apartando o mostrando la pureza de sus líneas. O recorriendo los 750 km de la Marcha de Resistencia, esa hazaña. El crecimiento de la raza, el mejoramiento de su genética y la necesidad de desarrollar el atractivo funcional del criollo fueron guiando su uso en esa dirección. También, claro, está el criollo como herramienta de trabajo en el campo, apartando, arreando, encerrando, embretando, enlazando y demás andos.\n\nEn el campo siempre hay tiempo. Un mate más, otra historia, el tranquito para revisar las aguadas, la siesta en verano. Eso hace del hombre de campo típico una persona parsimoniosa, tranquila, paciente. En la ciudad no existe ese tiempo. No hay paseos porque hay embotellamientos, no hay un mate más porque se va el colectivo, ni hay oportunidad de historias alargadas. Se va al punto, se concreta, se sintetiza, se abrevia, se empobrece. Ni siquiera en el campo logra desacelerarse el citadino. Porque va el fin de semana y son solamente dos días y el lunes hay que estar de vuelta y andá a saber cuántos kilómetros se hicieron para llegar hasta ahí. Entonces no se frena y se revisan manadas, potrillos y padrillos, se trabajan los caballos en doma, se chequea que la casa esté en condiciones y al final, si queda tiempo, se ensilla y se sale a dar una vueltita, un paseo.\n\nEsta tecnificación en el manejo de nuestro caballo nos ha permitido alcanzar niveles de calidad inéditos, pero nos estamos olvidando de andar a caballo. Del acto puro y simple de ensillar y montar sin objetivos precisos, distraídos de la rectitud, olvidados de la reunión, ignorantes de la pata. Enhorquetados en comunión con el caballo como excusa, como simple vehículo, como aglutinante con el otro, transformándose éste en el punto de contacto igualador entre los jinetes.\n\nPorque desde el momento en que montamos y nos cruzamos con otro en la misma situación, se genera un vínculo, una cercanía instantánea que permite la charla amable, el genuino interés por ese otro que conforma el nosotros y nos enriquece y completa.\n\nLa cabalgata nos permite hacer esa metamorfosis, ese cambio de chip que nos deja jugar a hombres de campo por una semana. Pero no porque nos vistamos de faja y pañuelo y andemos a horcajadas todo el día ni porque guitarremos folclore a la nochecita, nos convierte en hombres de campo porque nos regala lo más valioso que se le puede dar a un hombre de ciudad. Nos regala tiempo.\n\nSon cinco días donde no hay que llegar temprano más que al horario de salida, cinco días donde en el momento en que subís terminaste tus deberes de la jornada y solamente te queda disfrutar del caballo, del paisaje, de los marcheros. Esos cinco días con tiempo y desconectados del mundo real alcanzan para relajarse y propician la charla, el encuentro, aumentan el interés por el otro, por sus historias, por cómo está, si necesita ayuda, si esa cincha está bien, si vení que te ajusto, podés con ese caballo de tiro, guarda que perdiste una herradura, alguien quiere agua, mirá los cóndores, de dónde sos, qué lindo el picazo, dónde te hiciste esa cabezada, pasame un mate, mirá lo que es esa vista.\n\nAndar a caballo en su versión más pura, eso es la Cabalgata de Criadores. Una institución dentro de la raza con 22 ediciones consecutivas a lo largo y a lo ancho del país, desde la Quebrada de Humahuaca a San Martín de los Andes y de Mendoza a Mar del Sur, por la que pasaron desde jinetes campeones hasta familias entusiastas con edades entre 7 y 80 años. Un lujo que tenemos a disposición todos los criollistas cada febrero.\n\nMe cuesta cerrar esta nota porque me queda la sensación de no haber transmitido fielmente lo grandiosa que es la Cabalgata. Doy vueltas, tacho, reescribo y fracaso. Hasta que me doy por vencido y pienso, con una media sonrisa, que no es culpa de la pluma. Yo les puedo contar, medio a lo bruto, lo que pasa cada febrero, les puedo decir lo que yo siento, les puedo anticipar lo que creo que van a sentir ustedes. Pero, si realmente quieren saber de qué se trata, tienen que ajustar una cincha ajena a las 6 de la tarde en un desfiladero mientras el viento les vuela el sombrero y el caballo, amadrinnado, no les hace el favor de estarse quieto. Ah, van a ver que esa cincha de ajena no tiene nada, que es tan de ustedes como las manos que ajustan y la sonrisa que agradece. Ah, y no a través de las palabras, van a entender de qué les hablo. No puedo escribir más nada. VENGAN A LA CABALGATA, no saben (no pueden saber) lo que se están perdiendo."},
            {"id":"2014","year":2014,"title":"Final Nacional FZB Categoría A 2014","location":"Palermo","date":"Marzo 2014","content":"La cosa en el campo es temprano. Y la cosa cuando el campo va a la ciudad, parece que también así que el 30 de marzo de 2014 que era domingo y llovía a cántaros desde la noche anterior y animaba a calentar el agua y sacar las facturas, hordas de criollistas se apropincuaron en las barandas de la pista cubierta de la Rural para ver la Final Nacional de Rienda Felipe Z. Ballester, categoría A. Bueno, lo de hordas es exagerado, pero todo el resto no.\n\nSe corría la final de la A, lafinaldelarienda, cómo no ibas a estar. No importaban los horarios ni el clima ni cuánto sueño habías cosechado la noche anterior. Movía Cachín, el Negrito Aguilera, Pedrín, Gonzalito, Marcos volvía después de un año. Qué otra cosa tenías que hacer. Además, la lista de cracks que habían clasificado invitaba a la emoción porque no solo volvía el Miralejos sino que estaba la Pistilla para defender el título, volvía después de un año la Justiciera a confirmar todo lo que ya no necesita confirmarse y entraba con todo el peso de la candidatura y con un premio morfológico del día anterior la yegua más mirada de ese domingo, la Chuquisaca.\n\nPero vamos a lo nuestro. Pasó la presentación, pasó el himno, arrancó la adrenalina y se quedó en pista la Justiciera, la bayita de La República que tanto nos había deslumbrado dos años atrás y que después de una temporada de descanso venía a por sus fueros. No arrancó bien, rompió al galope en los andares y, si bien Cacho la contuvo, perder puntos así es muy costoso y más con esta yegua que tiene como uno de sus fuertes a los andares. En el resto de la prueba no pudo remontar y terminó con 42 puntos que no le hacen justicia a su calidad.\n\nAtrás de ella venía el Pitucón, educado caballo montado por el debutante Luciano Machado que tenía sobre sus hombros la responsabilidad de llenar el lugar que había dejado Pablito Sánchez, que vive ahora en Chile. Lo del Pitucón fue prolijo, después de una muy buena semifinal pero no pudo asomar la cabeza demasiado y terminó con 43 puntos que lo dejaban sin esperanza.\n\nEl primer puntaje destacable lo iba a hacer el Mañanero Un Secreto, primera monta de Gonzalo Nievas en la prueba. El gateado que venía a su segunda final nacional, metió 48 puntos gracias a su gran regularidad y a un volapié de 8 y medio que no iba a ser fácil de vencer, como nos tiene acostumbrado este padrillo de patas veloces. Buen puntaje para él y la final que empezaba a tomar colorcito.\n\nEra el tiempo del veteranísimo Siete Lapacho, montado por el (no tan) veterano Luisito Bustos. El gateado, héroe de mil batallas, conocedor de todas las pistas del país y noble como pocos, sintió la edad y no pudo destacar. Salvo una buena rayada de 7 puntos, no tuvo movimientos bien premiados y terminó con 40 puntos y medio y, creo, un pasaporte al retiro de las competencias y todos los agradecimientos que se merece este capón que dio todo y supo ser tercero en la final de hace dos años.\n\nDespués de un año sin estar, el primero en su carrera, entraba a la pista Marcos Nievas, el eterno campeón, con Tinajera Buena Ley. Vistoso gateado de potentes movimientos, este hijo del Vinchuca entraba ganoso a la pista a demostrar que su buena semifinal en la inundada pista de Jesús María había sido más que un golpe de suerte. Regularidad en sus movimientos le iban a reportar 44 puntos y medio y la noción de que no iba a alcanzar pero que el papel había sido más que digno.\n\nMientras el padre terminaba de mover, el hijo se aprontaba a la única experiencia que le faltaba vivir. Gonzalito se paraba al borde de la pista con su Pistilla para defender el título de Campeona Nacional A del año pasado y la yegua, como siempre, entraba de orejitas paradas, fina y elegante, con ganas de llevarse puesto todo lo que le pusieran enfrente. Siempre digo que para ganar la rienda hay que ser regular y, además, clavar un par de goles al ángulo que te den esa diferencia de puntitos que te aseguren el campeonato. La Pistilla es regular siempre y, también siempre, mete un par de joyitas. 8 puntos en la rayada y 9 en el volapié la dejaron con 52 puntos, bien lejos del resto y con la adrenalina de saber que el bicampeonato podía ser una realidad pero que, sobre todo, el binomio había cumplido las expectativas.\n\nLa prueba seguía y Cachín entraba con su segunda yegua, la Cuyano Bien Pagada, que había clasificado bien pero que no estaba entre las candidatas. Un cero en el desmontar y montar y algunos movimientos con bajo puntaje la dejaron totalmente afuera de la pelea con 41 puntos.\n\nEn la punta de la pista se veía a la Chuquisaca. Precedida por la gallardía de su cogote, la yegua más linda en pisar jamás una pista de rienda, entraba al paso desplegando su elegancia y despabilándonos la modorra a todos. La comparación contra los puntos de la Pistilla era inevitable y para la mitad de la prueba ya le había sacado dos puntos y medio, había hecho 10 en una rayada inolvidable por lo potente y lo equilibrada y encaraba el final de la prueba con todas las chances. Seis y medio en el volapié la dejaron empatada con la Pistilla hasta ese momento y la cosa se puso peluda. Peluda para nosotros que veíamos, porque el negrito Aguilera y la Chuquisaca ni se enteraron. Metieron ¡nueve! en la vuelta sobre las patas y 8 y medio entre los dos últimos movimientos para clavar 56 puntos en la pizarra y tirarle toda la presión del mundo y alrededores al Miralejos que esperaba para entrar.\n\nPero antes faltaba el Encontrado, el lindo colorado de Matteucci y Barcia que había andado bien en el Freno, después había ganado con Gonzalito el campeonato de rienda del Rodeo Cuyano y ahora venía por los puntos a Palermo. Educado y correcto, domadísimo como todo lo que arregla este mendocino, tuvo una prueba consistente y terminó con 44 puntos en una actuación muy valorable.\n\nY por fin el Miralejos. De nuevo el Miralejos. Dos años de espera para ver a este tremendo crack que puede ganar en cualquier pista que entre, que tiene récords por doquier y una plasticidad envidiable. Pedrín lo hizo caminar, trotar, galopar, parar, dar vuelta, meter una rayada maravillosa y el caballo hizo todo lo que hace siempre. Hasta moverse. Porque otra vez llegó para ganar al desmontar y montar y se hizo un silencio tal que se escuchaba hasta el tic-tac de los relojes porque ni se respiraba para no espantarlo y el tipo no va que otra vez decide que quedarse quieto no es lo de él. Cero puntos en el ejercicio y el sueño del campeonato que se esfumaba. 51 puntos para este caballo que todos queremos que vuelva, que siga y que alguna vez termine en el tope de la tabla.\n\nLos resultados, entonces, fueron los siguientes:\nCampeón Nacional: Vilcún Chuquisaca - 56 pts\nSubcampeón Nacional: Dormida Pistilla - 52 pts\nTercero: Tinajera Miralejos - 51 pts\nCuarto: Mañanero Un Secreto - 48 pts\nQuinto: Tinajera Buena Ley - 44,5 pts\nSexto: Del Payé Encontrado - 44 pts\nSéptimo: Quelú Pitucón - 43 pts\nOctavo: Del Siete Justiciera - 42 pts\nNoveno: Cuyano Huinca Bien Pagada - 41 pts\nDécimo: Siete Lapacho - 40,5 pts\n\nY ahí todo fue fiesta y champagne y podio y la barra del negro Aguilera bramando por el Campeón y un negro emocionado y emocionante que se abrazó con todos, querido como es, y que después de festejar se subió a su yegua y la miró agradecido y le advirtió que no se relajara, que el año que viene, en otro domingo de marzo, tienen otra cita en Palermo."},
            {"id":"2016","year":2016,"title":"Final Nacional FZB Categoría A 2016","location":"Palermo","date":"Octubre 2016","content":"Final Nacional FZB categoría A\n\nTodos los días de todos los meses de todos los años un puñado de jinetes amanece antes de que levante el rocío y ensilla hacia la improbable idea de estar 10 minutos de un día en la pista de Palermo.\n\nDe ese puñado, solamente 10, a veces incluso menos, llegan a estar ese domingo que se corre la final de la Rienda, a secas y con mayúsculas. La Rienda. Porque todas las categorías son importantes y tienen su mérito, pero La Rienda es la A.\n\nY ahí estaban ellos un año más, del lado de adentro, y ahí estábamos nosotros un año más, del lado de afuera esperando que los que estaban adentro nos volvieran a emocionar. Como hacen siempre, como volvieron a hacer esta vez.\n\nEse domingo a la mañana empezaba con el histórico Cachín Ampuero, que venía con su humildad de siempre a probar suerte un año más. Montaba la Juanita, una bayita hija del Merengue que hizo todo parejito y una rayada de 8 que le valieron 54 puntos en total y la certeza de que iba a estar entreverada entre los de arriba. Quedaban 9 caballos por mover y Cacho ya les había puesto presión a todos, como hacen los grandes.\n\nEn este duelo de campeones que es siempre la final de la A seguía Raúl González con Matute Ayacucho Chorrillo, lindo alazán venido de Cuyo que fuera campeón de la C, después siguiera su campaña en la B y ahora coronaba su campaña entrando con su tranco firme y suelto en la final de la A. Lamentablemente, un error en el recorrido de los andares le iba a costar la prueba, un cero demasiado caro en una prueba como esta. Raúl, con toda gallardía, completó la prueba dignamente pero un cero más en el retroceso lo dejaba con 34 puntos y medio y la esperanza puesta en el año que viene.\n\nLa Cadrila entró a la pista con su tranco elegante y despierto y con su jinete, el Poki Moreno, que parece no transpirar ni en enero. 8 puntos y medio en unos andares difíciles de mejorar ponían esperanzas en la yegua pero una rayada de 5 y medio, en lo que es uno de sus fuertes, les recordaba que la rienda es maravillosa, pero ingrata. El binomio retrotraía con otro 8, ahora en la troya, y la rienda le respondía con otro 5 y medio, en el ocho. Buen volapié y vuelta y 9 puntos entre los dos últimos los dejaban con 52 puntos, segundos por el momento y a la expectativa de qué pudiera pasar.\n\nEl Negro Aguilera, campeón del año pasado, venía también con un padrillo, el Escrache. Gateado de una presencia imponente, se robó toda la atención porque cuando mueve el Negro todos nos callamos y miramos. No iba a ser el día del Escrache, se volvía para la casa con 42 puntos y medio pero con toda una carrera por desplegar en el futuro. Al Negro le quedaba un tiro todavía, nada menos que la Chuquisaca.\n\nMatute Ayacucho El Trueno era el caballo y Gonzalo Nievas el jinete. Una combinación inmejorable de juventud y experiencia en los dos que nos hacía ilusionar a todos. Y no defraudó, mirá si Gonzalito iba a defraudar. Prolijísimo, fiel reflejo de su jinete, el Trueno metió todos ejercicios de 7 y medio, uno de 8 y otro de 7, más los 10 puntos en los últimos dos. Porque para caballos arreglados, el Trueno. 55 puntos, primero para el campeonato, 5 caballos por venir y la final que empezaba a tomar forma definitiva. Pero faltaban un par de cracks.\n\nAtrás venía el Guay Juramento, derechito desde Salta. Este crack, hijo de (todos de pie, por favor) el Pozo Azul Juramento, ya había sido cosa seria hace unos años en una semi en Mendoza y ahora había demostrado todo para estar en la final. Su jinete, Ricardo Tolaba, uno de esos queridos por todos, trabajador como el que más y con una humildad a prueba de balas, llegaba a la final de Palermo por primera vez en su vida pero no tenía pensado conformarse con estar.\n\nEl pingo arrancó con unos andares que fueron una delicia de ver: sueltos, plásticos, parecía que se tragaba la pista con el avance. Richard, arriba, iba con la tranquilidad del que sabe que tiene caballo de sobra. 8 puntos en el ejercicio y la tribuna que empezaba con esa cuenta fascinante que compara ejercicio contra ejercicio a ver cómo viene contra el primero, si le puede ganar, cuánto le falta. Y Richard y el Juramento arrancaban medio punto arriba. Dos pruebas de 7 y medio lo mantenían en carrera pero un ocho de 5 y medio paró el tiempo en Palermo. ¿Se terminaba la aventura de los salteños? Ellos tenían otros planes. Un volapié que fue una pintura se lo pagaron con 8 y medio y en una vuelta aguerrida se llevaron otros 8 y medio más para volver a ponerse solamente a medio punto de Gonzalo. Pero tenían que hacer 10 en esos últimos dos ejercicios mañeros para ganar. Fueron 9 y medio al final, 55 puntos se iban para Salta, primer puesto empatado y las carita que se empezaban a mirar en la tribuna, con señas de satisfacción.\n\nY la satisfacción era por lo que acabábamos de ver pero también porque atrás entraba la bicampeona, defensora del título del año pasado y del anterior, Vilcún Chuquisaca, montada ni más ni menos que por el Negro Aguilera que quería el tricampeonato. Pero la Chuqui tenía otros planes para este año. No caminó ni trotó en los andares y arrancó con un 4 y medio que le complicaba las cosas. Pero el Negro sabe que le sobra yegua y la hizo andar. Metió una seguidilla de 8 y medio en la rayada, ¡9! en la troya y 8 en el ocho para volver a meterse en la pelea. Pero de nuevo la Chuqui se iba a rebelar y se iba a mover en el desmontar y montar. 48 y medio en total y el sabor amargo de saber que los caballos tienen días y que la suerte también juega.\n\nVolvía Gonzalito a la pista, ahora con la Talapampa Curandera, una oscura de los Gómez Quiroga que había hecho todo el camino, arrancando en caballos novicios y llegando hasta la final de la A. Una prueba correcta pero sin grandes hitos la acomodaba en 48 puntos y medio, más que dignos para una yegua debutante en la categoría. Todo el arreglo y la doma de Gonzalo se vieron en la pista, falta que la yegua madure y dé todo lo que tiene para dar.\n\nEntrábamos en la recta final, faltaban dos caballos. El linaje de la cabaña La Escondida entraba a la pista a través del Tinajera Caleufú, montado por Santiago Martínez. Campero y guapo, el Caleufú paseó su brava estirpe pampeana, de la tierra de la Aguas Claras, la Gavina y tantas otras, para dejar bien en alto su honor y bien surcada la pista de las rayadas y los volapiés que hizo. 50 y medio para el bayo y nada que reprocharse.\n\nEra el momento de la campeona B del año pasado, Del Siete Estampa. La última del día. Era ganar o iba a haber desempate al menos entre el Trueno y el Juramento. Cachín Ampuero venía enhorquetado en esta ¡nieta! del Estribillo y estaba dispuesto a quedarse con todo otra vez, como lo había hecho en 2008 montando al Juramento, padre de la Estampa. Y empezó derechito, 8 puntos en los andares seguidos de una prueba prolija pero 5 puntos y medio en la vuelta sobre las patas lo dejaba afuera de toda competencia aunque hiciera 10 en los últimos dos ejercicios (cosa que hizo). 52 puntos y medio para los venidos de Luján y la expectativa de verlos el año que viene.\n\nDesempate. Si la prueba había sido emocionante, ahora venía un desempate entre dos cracks. El experimentado campeón Gonzalo Nievas contra el debutante en finales Ricardo Tolaba. Caballos les sobraban a los dos así que esto se iba a definir, como siempre, por detalles. Andares, ocho y vuelta sobre las patas y que sea lo que tenga que ser, arranquen que nos comen los nervios. Entró primero Gonzalo que marcó 7 y medio en los andares para seguir su tradición de prolijidad. Pero en el ocho pasó algo. Ni Gonzalo sabía, si después lo repitió en la antepista y el Trueno hilvanó un ocho prolijo y potente, como hace siempre. Pero en el desempate no quiso, o no pudo, nunca lo vamos a saber. Lo cierto es que siguió de largo en un cambio y no siguió el recorrido del ocho. Gonzalo lo paró, se sacó el sombrero y encaró para el jurado. Retiró el caballo y le dejó servido en bandeja el campeonato a Tolaba y al Juramento.\n\nRichard podría haber regulado, hacer las tres pruebas a media máquina si lo único que tenía que hacer era superar 7 puntos y medio. Pero en el campo no se enseña a especular, en el campo se deja todo en cada oportunidad. Y Richard dejó todo, si hasta clavó 8 en la vuelta sobre las patas para terminar a lo grande, cuando ya era campeón. Y así este salteño se llevaba el premio mayor, debutaba campeonando en Palermo y en la A. En La Rienda. La emoción de los Wayar, dueños del caballo, y de Roberto Cerutti, su criador, se veía en los abrazos y los ojos llorosos. Y así, por primera vez desde que el Bailarín (hijo del Afinao) ganara la rienda allá por el principio de la década del '90, ganaba la Rienda un hijo de un campeón de Rienda. Juramento padre y Juramento hijo hicieron historia los dos en el mismo instante. Cachín Ampuero en 2008 y Ricardo Tolaba hoy pusieron una vara difícil de saltar para todos los criadores.\n\nLa rienda siempre pelea su lugar. A veces pierde un poco de terreno, como esta vez que la pista era mala y que el horario no era el mejor. Pero siempre termina dando espectáculo. Porque cuando hay caballos buenos y jinetes con corazón, el éxito es inevitable."},
            {"id":"2017","year":2017,"title":"Final Felipe Z. Ballester \"A\" 2017","location":"Palermo","date":"Octubre 2017","content":"Final Felipe Z. Ballester \"A\" 2017\n\nEn algún box de algún lugar de la pampa húmeda, con el hocico hundido en un tacho de avena mojada, enmantado y tranquilo, un padrillo está a punto de ser protagonista de un día histórico y lo ignora completamente.\n\nA varios kilómetros, en un enorme galpón ruidoso, lleno de carteles, bombo, bandera y vincha, 10 caballos entran en calor porque se viene la final de la Rienda A. Todo el año, un paquete de caballos y jinetes dan vueltas, trotan, galopan, entran las patas y se quedan tiesos, movidos por la pasión que genera la rienda. Esa enfermedad incurable que hace que nunca más puedas mirar un caballo galopando con la mano cambiada y que no te moleste.\n\nAsí que ahí estaban ellos, los caballos con los grandes que los montan, y ahí estábamos nosotros, los que nos brillan los ojitos cuando vemos un volapié fluido, esperando justamente eso: llenarnos de volapieses, vueltas sobre las patas, troyas a fondo.\n\nY los vimos, porque la rienda nunca te decepciona. Arrancó Gonzalito con El Trueno, tremendo lobuno que ya tiene varias batallas y que todavía no fue campeón porque por año gana uno solo y, bueno, que le vas a hacer. El tipo clavó 52 puntos de arranque nomás, como diciéndole al resto que no le temblaba el pulso para romper el hielo. Una prueba bien prolija, con una vuelta sobre las patas tremenda que se pagó con 8 y a sentarse a esperar que la cosa ya empezaba linda.\n\nSiguió el Chacaré, primer hijo de varios del padrillo del que les hablaba al principio (que seguía sin enterarse). Pedrín en la montura no se iba a asustar por los puntajes de Gonzalo y, ayudado por una rayada de 9.5, clavó también los mismos 52 asegurándose un desempate entre su gateado y el lobuno de Gonzalo.\n\nDel Siete Juanita, porque siempre tiene que haber una baya de La República en la final, entró a la pista montada por el gran Cachín Ampuero pero no iba a tener la suerte de otras veces. Un buen comienzo tentaba la ilusión, pero una vuelta sobre las patas de 5 la dejaba con 49 puntos y ganas de revancha.\n\nHugo Sánchez mandó a su Manantiales de las Palmas Leñador derecho a la pista con ganas de pisar fuerte, pero ya en la rayada se vio que no iba a ser su día. Una pena para el oscuro que seguramente va a ver años mejores, 44.5 puntos y la amargura de saber que hay mucho más caballo de lo que se dejó ver ese día. La rienda es así.\n\nAl Quelú Pitucón lo hemos visto tantas veces que le reconocemos la sombra ya, y nos alegra siempre volver a verlo. Montado por Luciano Machado, jinete capacitado y veterano de cien batallas, entró con ganas de estampar su nombre bien alto y por un rato le pegaron una asustada a varios. Una prueba parejita, prolija, de esas lindas de ver, lo dejó con 49.5 puntos, segundo atrás de los empatados, expectante.\n\nLa rienda siempre tiene esa cosa de que entra un caballo atrás del otro y uno medio que no se da cuenta, salvo cuando entra Marcos Nievas. La elegancia, la gloria acumulada y la humildad de este campeón histórico te hacen levantar la vista siempre. Marcos apareció montando al Entablao Distraído, un gateado que no dio todo lo que tenía y se quedó en 40.5 puntos, sabedor de que está para otras cosas.\n\nSi hablamos de elegancia y prolijidad, hablamos del Poqui Moreno y sus montados. Tenía dos en esta prueba y mandaba primero a la Cadrila, yegua que también ya reconocemos de lejos, y que andaba con ganas de entreverarse entre los de arriba, como siempre. La corrección, las entradas de pata, y una vuelta soberbia que debe haber dejado un pozo en la pista y se pagó con 9.5 (el puntaje más alto de toda la prueba) la dejaban segunda hasta el momento, con 51.5 atrás de los empatados que seguían firmes ahí arriba.\n\nVolvía a entrar Cacho, pero esta vez con la Estampa. Yegua que ya había ganado la B, que había clasificado primera para esta final y que también era hija, la segunda de esta prueba, del caballo del que les hablaba al principio. Yegua regalona del Negro Bustos, el hombre estaba que miraba de reojo de los nervios, pero pronto iba a ver que no tenía de qué preocuparse porque había yegua y había jinete. Cachín, como siempre, con la yegua en las yemas de los dedos, la hizo bailar por la pista con una mezcla de potencia y elegancia que le dio, no una, sino dos pruebas de 10 puntos, la rayada y el volapié, y 10 puntos más en las últimas dos pruebas (y que ya van a ver que van a ser determinantes), compensando así una vuelta de 5.5 que le paró el corazón a más de uno de los que habían venido de Luján. 56.5 para estos dos que nos dejaron rojas las gargantas de tanto entrar las patas y los ojos llenos de rienda. Primeros solos y ahora andá a ganarles.\n\nA eso vino el Poqui con el Vilcún Rumbeado, para mostrar que no se le movía un pelo con lo que había pasado recién en la pista. No iba a poder ser aunque el Rumbeado iba a clavar una vuelta sobre las patas de 9 puntos, la segunda mejor de toda la prueba y la demostración de que parece que el Poqui algo sabe de hacer girar los pingos. 50.5 y a esperar la ubicación final.\n\nEl año pasado, un gateado rubio que se llama igual que el caballo del que les vengo hablando y que a esta altura está tirado en su box medio dormitando y sigue ignorando lo que les vengo contando, había tomado por asalto la final de la A y cuando quizás nadie lo esperaba se había llevado la prueba inapelablemente, a fuerza de volapiés y rayadas históricas y una prolijidad envidiable para el resto, dejando sin campeonato a un montón de grandes y dándoselo al debutante Ricardo Tolaba. Este año, montado por el Negro Aguilera, venía a reclamar su título y arrancaba con unos andares de 8 y una rayada de 9.5, por si alguno todavía andaba dudando de sus intenciones. Troya y ocho de 7 y 6 que lo mantenían en la pelea y volapié de 8 que lo dejaban en la puerta de la consagración si hacía una buena vuelta, el punto flojo de la Estampa, todavía puntera. Cumplió el Juramento con 8 en la vuelta, pero la rienda es ingrata y siempre tiene un puñal abajo del poncho. 3 puntos en el desmontar y montar ya lo dejaban afuera de toda competencia y el 4.5 final lo depositaba en 54.5, gran puntaje para una final pero segundo atrás de la Estampa.\n\nAsí las cosas, Del Siete Estampa Campeona Nacional de Rienda categoría A, temporada 2016-2017 y Guay Juramento, subcampeón. Pero había más para ver, el tercer puesto estaba empatado en 52 y había que desempatar.\n\nGonzalo primero, a romper el hielo, segundo desempate en dos años, esta vez por el tercer puesto, el año anterior por el primero. Arrancaba firme con 7 en los andares y 7.5 en el ocho, pero un volapié de 6 le dejaba abierta la puerta a Pedrín, que se relamía. Pedrín arrancaba con 6, porque si no hay suspenso no es rienda, metía 8 en el ocho para arrimarse y remataba con un volapié tremendo, incluso mejor que el primero y que le pagaban 8.5 para ganar el desempate y dejarlo solito en el tercer puesto.\n\nEl resultado final fue el siguiente:\n1. Del Siete Estampa - Cachín Ampuero - 56.5 puntos\n2. Guay Juramento - Cristian Aguilera - 54.5 puntos\n3. Tatutí Chacaré - Pedrín Muñoz - 52 puntos (22.5 en el desempate)\n4. Matute Ayacucho El Trueno - Gonzalo Nievas - 52 puntos (20.5 en el desempate)\n5. Vilcún Cadrila - Poqui Moreno - 51.5 puntos\n6. Vilcún Rumbeado - Poqui Moreno - 50 puntos\n7. Quelú Pitucón - Luciano Machado - 49.5 puntos\n8. Del Siete Juanita - Cachín Ampuero - 49 puntos\n9. Manantiales De Las Palmas Leñador - Hugo Sánchez 44.5 puntos\n10. Entablado Distraído - Marcos Nievas - 40.5 puntos\n\nTodos los años la rienda nos emociona y nos hace vibrar, pero además siempre nos agrega una historia. El protagonista de este año es el caballo del que les vengo dando pistas desde el principio. Algunos memoriosos recuerdan que el Facón metió tres hijos en el podio allá lejos y hace tiempo, cuando esas yeguas brillantes de La Escondida andaban desparramando arena en cada entrada de patas. Lo que no había pasado nunca, hasta ahora, es que un padrillo campeón de la Rienda A haya metido tres hijos suyos en el podio. Y es que la Estampa, el Juramento y el Chacaré, son hijos directos de ese enorme padre que se compró el boleto a la historia, y que todavía lo ignora pero nosotros ya no. Pozo Azul Puange Juramento, caballo traído del otro lado de esas montañas que nos unen con Chile, que se volviera a domar y arreglar en La República bajo las órdenes del Negro Bustos y que ganara, en 2008, la final de la Rienda A montado por Cachín Ampuero, que casi 10 años después recuperaría el título en su hija, se ganó el mayor privilegio que un caballo puede tener en nuestra raza: se volvió indiscutible."},
            {"id":"2018","year":2018,"title":"Final Nacional FZB Categoría A 2018","location":"Palermo","date":"Noviembre 2018","content":"Es domingo al mediodía y las tribunas de la pista cubierta de Palermo se van llenando de paisanos que se arriman, como en una procesión laica, a ese pedazo de arena en el medio de la ciudad para ver la final de la Rienda, la meca de todos los apasionados por este disparate de ver un caballo dar vueltas sobre sí mismo hasta ponernos la piel de gallina.\n\nEs la final de la Rienda como siempre, porque es igual y es distinta, como cada vez. Esta vuelta, con el condimento de una Pre Final, que se había corrido el día anterior y había dejado solamente seis binomios para la final. Seis esperanzas separadas de la gloria por esa hora y pico que faltaba para saber quién se llevaría los laureles este año. Seis esperanzas con dos protagonistas, campeona y subcampeón del año pasado, que venían a sacarse los ojos por el título, de nuevo.\n\nA la pista, entonces. Matías Vázquez, que fuera campeón de la B, arrancaba con Viñatero Tramposo a ver si podía dejar un numerito en la pizarra que pusiera nervioso a todos los que venían atrás. 7 en los andares y un rayadón de 8.5 como para sacarse los nervios lo encaminaban derechito. Le iba a poner 7 a la troya y 5.5 en el ocho, único tropezón en una prueba que se perfilaba muy buena. Volapié de 6 y vuelta de 7.5 para completar lo que siempre necesita la rienda, consistencia. Le quedaban el desmontar y el retroceso, ese tándem de la muerte, frustrador histórico de sueños, pero Matías no se iba a intimidar, sumaba 9 entre los dos y dejaba sus 50 puntos y medio clavados ahí, y ahora que le ganen.\n\nSeguía Cachín con la baya, Del Siete Verá que No, primera de sus dos montadas. La yegua pagó su poca experiencia con unos andares de 5.5, pero se recuperó con trío de 7, 8 y 7 en la rayada, la troya y el ocho. 6 y 5 en volapié y la vuelta y 9 en los dos últimos movimientos la dejaban con 47 puntos y medio y con la bronca de que no alcanzó, pero con la certeza de que hay un crack ahí y que solamente le falta tiempo.\n\nEncaraba la pista Gonzalo con la Talapampa Siempre Bien y la tribuna iba entrando en calor, con un gusto raro por saber que ya estábamos en la mitad de la prueba, tan rápido, y que la final se nos escurría entre los dedos. Pero no había tiempo para apenarse demasiado, porque Gonzalo empezaba a tranquear unos andares que le pagarían con 9, metía una rayada de 7 y se despachaba con una de esas troyas que solamente él sabe hacer y que le iba a significar 8 puntos más. Tremendo primer tercio de prueba para el mendocino que le hizo parar la oreja a varios, pero que no iba a poder sostener porque iba a ponerles 5, 4 y 4 al ocho, el volapié y la vuelta, para ver frustradas sus ambiciones de premio. Tanto que ni el puntaje perfecto en los dos últimos movimientos lo iba a poder rescatar. 47 puntos para Gonzalito, la alegría de haber estado en una final más y las expectativas directo a la nueva temporada.\n\nLa estampa de La Estampa aparecía por el costado de la pista. Cachín traía a la campeona defensora de orejitas paradas hacia el centro de la pista para defender el título y arrancaba con 8 y 9 en los dos primeros movimientos para decir \"acá estoy\" y ponerle pimienta a la final. Un pequeño desorden en el final de la troya le costó que le pagaran solamente 7.5 puntos y un ocho no muy bueno le dio 5, obligándola a mostrar de qué estaba hecha en los últimos cuatro movimientos si quería ser bicampeona. ¿De qué está hecha? De lo que están hechos los grandes: 8.5 en el volapié, en lo que hasta el momento era el mejor del día y ¡9! en la vuelta para arrancar gritos y aplausos por todos los rincones de las tribunas. 4 en el desmontar y montar (como todos los caballos de la final, en algo que habrá que preguntarle a los historiadores si había pasado alguna vez, arriesgamos que no) y 5.5 en el retroceso para completar 56.5, puntaje de campeona, puntaje de crack, puntaje que iba a venir a disputar el Juramento, el otro protagonista principal de esta final.\n\nA los buenos deportistas no les dura la bronca por perder, la transforman en ganas de revancha. Y a eso venían el Negro Aguilera y el Juramento, todavía masticando esa final de 2017, pero concentrados en este 2018 que los tenía ahí, en el lugar y el momento indicados, listos para reclamar lo que creían suyo. Todos nosotros, relamiéndonos por lo que se venía y listos para ir comparando movimiento a movimiento, a ver cómo venía la mano. 7.5 en los andares para arrancar firme pero un poquito atrás y 8 en una rayada prolija, que parecía que iba sobre rieles el tipo. Le iba a poner 8 también a la troya, pero seguía sin alcanzarle, venía un punto atrás en el golpe por golpe. Llegaba el ocho, la oportunidad de oro para este binomio: la Estampa había dejado 5 puntos y una ventana abierta para que el Negro buscara la gloria por ahí. 7.5 le pusieron, con la templanza de los grandes, confirmaron con 9 en lo que sí fue ya el mejor volapié del día, 8.5 en la vuelta, puntaje perfecto en el desmontar y montar que hizo casi sin dejarlo respirar al Juramento (que no lo necesitaba, si es crack) y 5 en el retroceso para dejar 57.5 clavados, y quedar primero solo con un caballo más por mover.\n\nRaúl González venía a decir que no estaba todo terminado, que faltaba un rato y mandaba a su Melideo Comentario (que fuera campeón de la B con su hijo, cómo olvidarlo). Y para dejar clarito que no estaban ahí por casualidad, metían nada menos que 9.5 puntos en los andares y 8 en la rayada para que todos los que se habían distraído volvieran a hacer cuentas. Tres movimientos de 6, 5 y 6.5 iban a empezar a frustrar sus chances aunque el 8 en la vuelta y los 9 en los últimos dos lo iban a dejar con 52 puntos que lo ubicaban ya definitivamente en la tercera posición.\n\nNo bien anunciaron ese puntaje, explotó la barra brava que siempre tiene el Negro Aguilera en cualquier pista que pisa. Una barra que tiene por buen tipo, por generoso, por jinetazo y por campeón. Cristian Aguilera en Guay Juramento es Campeón Nacional de Rienda 2018 y el Juramento se convierte así en bicampeón, además del subcampeonato del año pasado.\n\nLa tabla quedó así:\nCampeón: Guay Juramento con Cristian Aguilera, 57.5 puntos\nSubcampeón: Del Siete Estampa con Cachín Ampuero, 56.5 puntos\nTercero: Melideo Comentario con Raúl González, 52 puntos\nCuarto: Viñatero Tramposo con Matías Vázquez, 50.5 puntos\nQuinto: Del Siete Verá que No con Cachín Ampuero, 47.5 puntos\nSexto: Talapampa Siempre Bien con Gonzalo Nievas, 47 puntos\n\nLa Rienda nunca defrauda. Fuimos a ver a dos cracks matarse por el campeonato y lo vimos, y además vimos cuatro caballazos más que nos sorprendieron, nos emocionaron y nos ilusionaron por lo que se viene. Pasan los años, pasan los competidores, cambian las reglas, los tiempos, las pistas y los espectadores, pero la Rienda siempre nos deja algo. Será que cada vez hay mejores caballos, y jinetes más formados y el entusiasmo de siempre. O será, quizás, que cuando algo se hace con pasión, con talento y con esfuerzo, el éxito está asegurado."},
            {"id":"2019","year":2019,"title":"Final Nacional FZB Categoría A 2019","location":"Palermo","date":"Otoño 2019","content":"¿Habrá algo más lindo que ajustar la cincha en Palermo? Porque sí, es algo que hacés todos los días, un montón de veces, casi sin pensar. Pero hay un día, para unos pocos privilegiados, que lo hacés con mucho cuidado. En Palermo. Antes de una final.\n\nPorque es otoño y se corre la final de la Rienda, el todo por el todo de un grupo de jinetes, solo unos pocos, que vienen a ver si meten las patas en la historia o si se vuelven al pago a seguir intentando.\n\nAfuera, somos un montón de gente dispuesta a no perderse ningún detalle, aprontamos biromes y catálogos para ir llevando los puntos, ensillamos los mates y está todo listo, arranca.\n\nIngresa a pista Gonzalo Nievas con la Talapampa Siempre Bien, yegua de los Gómez Quiroga con ganas de entreverarse entre los de arriba, y clava 8 y medio en los andares, como para que nadie dude de sus intenciones. Pinta para candidata, pero una vuelta sobre las patas de 2 puntos la deja complicada. 10 en los últimos dos movimientos, termina con 50 y a esperar a los otros participantes, a ver si le ganan.\n\nTinajera Caleufú y Santiago Martínez entran a lo suyo. El bayo de Esevich ya es conocedor de estas lides y entra a la pista confiado y con ganas de dejar huella. Hacen una prueba pareja, con una vuelta sobre las patas espectacular que le pagan 9, pero dejan puntos en los últimos dos movimientos y se van con 46 y medio, a pensar en la próxima temporada.\n\nMatías Vázquez se apronta con el Viñatero Tramposo, de Giuliano, y arrancan lo que va a ser una prueba bien pareja, a la que le suman una rayada de 8 y medio que los deja con 50 puntos también, casi asegurando que en algún lugar iba a haber desempate.\n\nCachín tenía dos caballos, la Estampa que ya sabía lo que era ganar, y el Cuyano Huinca Condenado, con quien encaraba la pista. Parecido al Caleufú, una prueba prolija, pero dejando varios puntos en el camino, termina con 47 y medio y a ponerle todas las fichas a la yegua.\n\nVolvía a entrar Gonzalo, esta vez con el bayo de los Crespo, directo desde Rosario. El Cruz Diablo No me olvides impone presencia y arranca con 7 en los andares, haciéndonos parar la oreja a varios. Caballo muy arreglado y ya casi un veterano de las pistas, Gonzalo lo lleva bien y lo deja en 50 puntos, sellando el triple empate y aumentando la tensión.\n\nLlegamos al tercio final, que empieza con el Zafarrancho, de Campos S.A., con la monta de Raúl González, que siempre está. Una rayada de 9 parece que lo pone como candidato al título, pero una vuelta sobre las patas de 5 lo tira para atrás y lo deja en 46 y medio. Quedan dos, por ahora es triple empate en la punta. Hay risas nerviosas y nervios a secas, pero nadie es indiferente a esta altura.\n\nEntra el Poky Moreno con Vilcún Maguyón, porque ya es una tradición que Enrique Tronconi tenga algún caballo en la final. El Poky hace años que pide pista y anda con ganas de ganar, pero arranca medio irregular. Hasta el volapié. Clava 9 puntos y corona con una vuelta de 8, entre los gritos de todos. 4 y 5 y medio en los últimos dos movimientos (¡ay, ese medio punto!) para quedarse con 54, mandar a los triple empatados al segundo lugar por lejos y sentarse a mirar a ver de qué está hecha la Estampa.\n\nY la Estampa está hecha de buena madera, y la monta Cachín que es una garantía, así que lo que se viene va a estar lindo. Afuera, todos a mirar nuestros apuntes para ir comparando movimiento a movimiento. 7 y medios en los andares para arrancar un punto y medio arriba y 9 en la rayada para aumentar a tres la diferencia y estirarla a cinco y medio con lo que suma en la troya. Pero va a perder esa diferencia punto a punto entre ocho, volapié y la vuelta, aunque quedándose con un restito, un medio punto al que se va a aferrar con uñas y dientes porque en los últimos dos movimientos no se sacaron diferencia y ese medio punto, ese cero coma cinco, la deja con 54 puntos y medio y la lleva a los libros de historia porque ya es, oficialmente, ¡Bicampeona Nacional de Rienda categoría A!\n\nHay emoción y aplausos, abrazos en la tribuna y en la pista, pero falta un rato, porque hay un triple empate en el tercer puesto. Entran los empatados uno a uno y termina siendo el mejor del lote el Viñatero Tramposo, dejando el resultado final así:\n\n1. Del Siete Estampa\n2. Vilcún Maguyón\n3. Viñatero Tramposo\n4. Cruz Diablo El No me olvides\n4. Talapampa Siempre Bien\n5. Cuyano Huinca Condenado\n6. Campos Zafarrancho\n7. Tinajera Caleufú\n\nA festejar algunos, a bañar otros y todos a arrancar de cero, porque cada año es distinto, aunque siempre la emoción va a estar asegurada. Este año, además, tuvo un condimento especial que vino desde la categoría B. El campeonato de Rocío Canut nos dio una alegría unánime y desde esta columna le mandamos un abrazo enorme y esperamos que esta crónica en 2020 la encuentre entre sus participantes."},

            {"id":"2020","year":2020,"title":"Final(es) de la Felipe Z. Ballester \"A\" - 2019-2020 y 2020-2021","location":"La República y Mendoza","date":"Febrero 2020 - Septiembre 2021","content":"Final(es) de la Felipe Z. Ballester \"A\"\n\nA falta de una, dos. En 2020, con la pandemia cerrando todo en plena semifinal y obligando a jinetes y expositores a casi escapar de Jesús María para poder llegar a salvo a sus casas, era difícil pensar que el año no estaba perdido. Y a medida que el año avanzaba y las restricciones no aflojaban, aumentaban las posibilidades de una temporada en cero. Pero la Asociación no aflojó la cinchada y jinetes, criadores y caballos mantuvieron firme el esfuerzo para llegar enteros y en las mejores condiciones posibles a ese febrero atípico en La República. A la vuelta de eso, seis meses después y en Mendoza, acaso la casa de la Rienda, tuvimos la final que ya correspondía al año en curso. Por eso, desde esta columna felicitamos a todos los involucrados y los invitamos, en un formato también atípico, a leer la crónica doble que este año (en el que celebramos el décimo aniversario de estas publicaciones) nos convoca a recordar lo que fue un año inolvidable. Y que esperamos que no se repita.\n\nFINAL NACIONAL \"A\" CICLO 2019-2020\n\nEl lugar era la República y el calor de febrero transpiraba los barbijos obligatorios de todos los concurrentes. Los jurados Horacio España y Luciano Trangoni se apersonaban en pista y empezaba el desfile de finalistas que después de un largo año, de todos los problemas que trajo la pandemia y de la incertidumbre en la que todavía vivimos, salían a buscar lo que querían que fuera suyo.\n\nEntraba Gonzalo Nievas, que tenía más caballos en la final que familiares en la tribuna, esta vez montado en el Leñador. Manantiales de las Palmas Leñador, oscuro importado de Chile que muriera poco después de la final y para quien vaya nuestro recuerdo. Arrancaba bien el pingo, imponente y con andares de 7 puntos y medio, pero se iba diluyendo a medida que la prueba avanzaba; nos regalaba una buena vuelta sobre las patas y dejaba la pista con 40 puntos y medio.\n\nSeguía Cacho, otro histórico, esta vez en la Condesa, una hija del Juramento. Unos andares de 6 nos ponían a la expectativa y después encadenaba un combo de 8-7-8-7.5 en rayada, troya, ocho y volapié para dejar bien claro que no habían venido a pasear. Seis puntos en la vuelta y un puntaje casi perfecto en los últimos dos la dejaban con 51.5 y el primer puntaje serio de la final. A recuperar el aire y ver qué hacían los otros.\n\nLa Mañanera Felpa, con la monta de Jorge Sánchez, iba a entrar con el pie izquierdo a la pista y después de unos andares de 1 punto y medio no se iba a poder recuperar, por lo que terminaba con 25 puntos y medio y ganas de revancha.\n\nVolvía la estampa de Gonzalo, esta vez con Matute Ayacucho El Trueno, caballo ya veterano de finales. 31 puntos y medio en los primeros cuatro movimientos nos hicieron abrir los ojos a todos y pensar que este año se le daba, pero un volapié de 4 y medio y un 3 en el desmontar y montar le empañaban un poco la prueba y quedaba con 52 puntos y medio. Primero por el momento, pero con sabor a que podría haber sido más.\n\nRaúl González aprontaba al Campos Zafarrancho para medirse por el título y si bien enhebraba 8 y 8 en la rayada y la troya, el resto de los movimientos no lo acompañaban y quedaba con 44 puntos y medio.\n\nNo iba a mejorar la cosa con el Del Oeste Charango, lindo gateado que Raúl traía inmediatamente después y que iba a tener una tarde lejos de sus mejores momentos. 34 puntos y medio y la certeza de que Raúl no se va a quedar con esa espina.\n\nSi hablamos de veteranos en finales, aunque su edad y su espíritu marcan una extremada juventud, tenemos que hablar del Negrito Bustos. Enhorquetado en el Libertador Espejo II, orgullo de su cría, volvía a entrar a una pista tratando de mejorar el podio que obtuviera con el Lapacho hace algunos años. Muy prolijo el Espejo, pero con puntos modestos y un volapié traicionero que lo dejó definitivamente fuera de la pelea por los puntos. 38 puntos y medio y a seguirle metiendo.\n\nVolvía a entrar Gonzalo, esta vez con el Matute Ayacucho El Chacal, también lobuno como el Trueno, tanto que si uno andaba distraído en YouTube podía pensar que se había trabado el video. Pero no, Gonzalo tenía cuatro caballos en esta final y este recién era el tercero. Siempre hablamos en esta columna de que para ganar la Rienda hay que ser prolijo en todos los movimientos y clavarla al ángulo en uno o dos para arrimar buenos puntos. El Chacal, en los primeros cinco movimientos, hizo 6-8-8-7-8-9, puntaje perfecto en el desmontar y montar y 5 y medio en el retroceso. Andá a ganarle. 55 puntos y medio y la cosa se ponía bien seria.\n\nTodavía con las entradas de patas y las vueltas del Chacal en las retinas, veíamos al Poky Moreno entrar a la pista con el Caruló Puchetín, caballo de linaje real que tiene en su pedigree a la histórica Mañanero Si Será. El Poky, siempre prolijo y humilde, volvía a una final a tratar de ser campeón de la A. Y nadie le puede decir que no hizo su parte para lograrlo. Una prueba recontra prolija, bien a lo Poky, con un volapié de 8 y medio y una vuelta de ¡9 y medio! lo ponían en camino firme para llevarse el título, pero esta prueba traicionera e ingrata le tenía guardado un retroceso fallido que le pagaban 2 puntos y medio para terminar con 53 y medio y un sabor de amargura e injusticia que nunca se termina de asimilar.\n\nEl otro multijinete de esta prueba era Raúl González que entraba con el Napaleofú Madrugón. Importante y vistoso lobuno, con unos desplazamientos elegantísimos y unas patas de excepción que le redundaban 9 puntos en los andares y 9 y medio en la rayada. Pero una vuelta de 5 y un desmontar y montar de 2 lo dejaban fuera de los premios con 50 puntos totales.\n\nEra el turno de Carlos Sánchez y Cimbronazo la Gallega, que nos iban a regalar unas lindas entradas
