 de patas, pero que no iban a poder sostener el nivel en el volapié y dejaban la pista con 40 puntos.\n\nEl último participante era, adivinaron, Gonzalo Nievas. Montado en el Cruz Diablo no me olvides, de la cría de Crespo y que montado por su dueño había ganado la final de Novicios hace unos años. Llegaba para terminar la faena sabiéndose campeón, porque punteaba la competencia con el Chacal. Una buena prueba y una vuelta sobre las patas espectacular, que le pagaron con 9, lo dejaban al bordecito del podio con 52 puntos y la satisfacción del deber cumplido.\n\nEn consecuencia y a la vuelta de tantas complicaciones, finalmente teníamos campeón nacional de Rienda \"A\" de la temporada 2019-2020. Gonzalo Nievas en Matute Ayacucho El Chacal era el legítimo campeón, y las felicitaciones eran para ellos.\n\nFINAL NACIONAL \"A\" CICLO 2020-2021\n\nEl lugar, esta vez, era Mendoza. Toda la Rienda del país se había convocado en un cónclave ultraintenso que nos llenó de caballos por varios días; presencialmente a los que pudieron llegar, y por la extraordinaria transmisión de la ACCC en vivo y en directo a quienes nos quedamos en casa. Fueron cuatro días de emoción, pasión por la Rienda, camaradería y competencia que tuvieron risas y llantos, alegrías y decepciones, pero que confirmaron que la Rienda es y seguirá siendo uno de los puntales de la Raza, con presencia federal, para todas las edades y para ambos sexos.\n\nY para muestra, un botón. Con la presencia de Antonio Fazio y Juan Cruz Amestoy como jurados, y Luis Bustos y Andrés Lalanne como eximios relatores, entraba en primer lugar Tinajera el Jefe montado por Anita de Battista que se convertía en la primera mujer en toda la prolífica historia de la Rienda en mover en una final nacional de la Categoría A. Con el volapié y la rayada como puntos altos de su prueba, los 45 puntos y medio son anecdóticos para Anita y este hijo de la leyenda de la Rienda, la Cimbronazo Esta Sí, cuyo mérito estaba dado por su sola presencia.\n\nSeguía en el orden Gonzalo Nievas con Luz Buena Agarrate Villa Seca, rosillo vistoso y bien arreglado como todo lo que mueve Gonzalo, pero que no iba a tener su mejor tarde y que se iba de la pista con 38 puntos y medio, perjudicado por un cero en el desmontar y montar.\n\nPero la Rienda da revancha, y a Gonzalo le suele tocar en la misma prueba, porque no me acuerdo cuándo fue la última vez que movió uno solo en la final. Firmeza 1958 era el nombre de la lobuna importada de Brasil que venía a probar suerte. También prolija y arreglada, yegua voluntariosa, no iba a lograr destacarse y una vuelta sobre las patas de 5 puntos y medio la condenaban a la mitad de la tabla. 41 puntos y a esperar mejor suerte el año que viene.\n\nRaúl González y Napaleofú Madrugón volvían a la final y volvían a meter 9 en los andares. Pero el resto de los movimientos no iban a ser tan buenos y por más que hicieron puntaje perfecto en los últimos dos, se iban a quedar con 46 puntos y un sabor un poco amargo.\n\nEntraba el campeón de la B del año pasado (que se corrió este año, porque todo es una gran confusión y nadie sabe en qué año vivimos). Nicolás Moreno y Azote el Águila hacían su debut en la A y pueden estar tranquilos de que han hecho un papel dignísimo. Unas patas fenomenales que les significaron 8 puntos y medio tanto en la rayada como en el volapié iban a ser los puntos más altos de una prueba que terminaba con 46 puntos y medio, el deber cumplido y todo el futuro por delante.\n\nVolvía a la pista Anita de Battista para convertirse, entonces, en la primera mujer de la historia que metía dos caballos en la final de la A. Tinajera Mapuche era su montado esta vuelta y una prueba prolija, pero sin grandes hitos, los dejaba con 42 puntos.\n\nCachín Ampuero, después del descanso para reacondicionar la pista, hacía su ingreso en Del Siete Licorera, yegua con linaje de Rienda al ser hija de la Lista Blanca, aquella alazana hija del Tutor que ganara la Rienda en los '90. No iba a ser con suerte esta aparición y la condena iba a venir por el lado del volapié y la vuelta sobre las patas. 41 puntos y medio y a pensar en la próxima temporada.\n\nAparecía un histórico de las pistas y a quien ojalá sigamos viendo todos los años en estas instancias. Rodrigo Castells se acercaba a saludar a los jurados montado en el Ñandú Cañón para medirse en tierra de gigantes. Unos andares problemáticos asustaban a su hinchada, pero 8-8-8.5 en los tres movimientos siguientes le devolvían las esperanzas. Cerraba la participación con 51.5 y los primeros puntos serios de esta final ya estaban en la pizarra.\n\nEra el turno del histórico Pedrín Muñoz, que con mucha hinchada propia se apersonaba con Del Yaretal Clotilde, yegua que fuera subcampeona nacional \"B\" tan solo seis meses antes y que ganara la morfología en los días previos. La prueba no iba a ser la mejor que esta yegua puede hacer y un volapié que le pagaron con 2 puntos la iba a dejar muy relegada, con 39 y medio en total.\n\nGonzalo -siempre Gonzalo- esta vez con el Entablado Distraído. Gateado brilloso y de paso firme que clavaba 8 en los andares e hilvanaba una prueba prolija que, sumada a esos 8 iniciales, terminaba con 48 puntos y la expectativa intacta.\n\nYa a partir de ahora solo quedaban Pedrín y Gonzalo, y no con un solo caballo. Tatutí Chimango era el pingo de Pedrín, pero no iba a tener la mejor tarde. Una prueba prolija, pero un volapié que no se pagó, los dejó con 41 puntos y medio. Pero Pedrín tenía una yegua más y quizás una carta bajo la manga.\n\nMatute Ayacucho El Chacal era el nombre y Campeón Defensor el título. Entraba Gonzalo con su lobuno dispuesto a defender lo que había obtenido en la República y 7 puntos en los andares y 7 y medio en la rayada le abrían la puertita de esa oportunidad. Pero una troya de 3 eran un golpe duro de remontar que ni siquiera una vuelta de 9 pudieron solucionar. 46 puntos y medio eran la factura final de un campeón defensor más que digno.\n\nFinalmente, después de este año y medio escandalosamente difícil, llegaba el último finalista de la Rienda A, para poner al día las competencias y los campeonatos y dejar todo organizado para seguir adelante en esta nueva normalidad. El jinete, nada menos que Pedrín Muñoz y la yegua, Gualta Presumida. La expectativa era total, ya que Pedrín podía ganar después de muchos años y volver a ese lugar que tan bien le queda. Pero empezaba con algún tropezón en los andares que le pagaban con 5 y medio y los corazones se paraban. Ningún problema para un campeón. 9 en la rayada y en el volapié compensaban con creces esos andares y los 7 puntos de la vuelta lo dejaban con todas las chances llegando a los últimos dos ejercicios, ahí donde se ganan y se pierden las grandes competencias. Es difícil de explicar el silencio que se hizo cuando Pedrín paró la yegua para bajarse. Daba miedo incluso desde la transmisión online, era absoluto. Y se rompió en un alarido cuando el hombre estribó con su pie derecho y mandó la yegua para adelante consiguiendo los cuatro puntos. Pero todavía no era campeón, había un movimiento más. Cuatro puntos y medio en el retroceso y campeón virtual, aunque nadie se animaba a festejar porque faltaba el control de bienestar animal. La tensión era total y a los que lo veíamos desde nuestras casas nos la relataba con maestría absoluta un Andrés Lalanne quizás más emocionado que los propios competidores. La pasión es así. Revisaron la yegua y cuando vimos el abrazo entre jurado y jinete supimos la decisión. Pedrín Muñoz es Campeón Nacional de Rienda A en Gualta Presumida con 53 puntos y la piel de gallina vuelve a aparecer mientras escribimos estas palabras.\n\nLa fiesta y la alegría fueron totales, Pedrín, querido por todos, volvía al primer lugar del podio. Pero, sobre todo, la fiesta fue de la Rienda. Todas las categorías, de la A a la Preliminar y Copa Femenina, pasando por las dos categorías de menores. Todos caballos buenos, impecablemente arreglados y cada vez más lindos. La Rienda empuja, tira para arriba y tiene muchísimo para aportar todavía. Bienvenido sea."},
            {"id":"2022","year":2022,"title":"Final Nacional FZB Categoría A 2022","location":"Jesús María","date":"Abril 2022","content":"Final Nacional FZB Categoría A 2022\n\nPor Nicolás Gimbatti\n\nEl día gris no combinaba con la expectativa. La final de la rienda volvía a Jesús María, volvía a hacerse en la fecha habitual, sin barbijos y compartiendo mates. Pero hacía un frío digno de otras épocas y las nubes, que no amenazaban nada, se mantenían ahí como un recuerdo de lo que habían sido los diluvios de las semifinales.\n\nLos jinetes, reconcentrados, deambulaban por la pista sin rumbo aparente, pero mirándolos con detenimiento no había un movimiento que no estuviera calculado. Se venía el sorteo y empezaba a no haber tiempo. Había que calentar los caballos y preguntarles cómo estaban en ese momento, buscarlos a ver si los iban a poder encontrar, tantearlos, prepararse.\n\nSorteo hecho y quedaba Nico Moreno con Azote El Revoltoso. Campeón de la B de 2020, Nico venía a decir cuatro cosas a la pista porque la rienda es para los que se animan. Ni tiempo a acomodarnos nos dio que ya había metido 7.5 en andares, 7.5 en la rayada, 6.5 en troya y ocho y 7.5 en volapié y vuelta. Hagan la cuenta, son puntos serios esos. Nadie estaba sorprendido, pero en realidad todos lo estábamos porque una cosa es saber lo que puede hacer un jinete y otra muy distinta es que efectivamente lo haga. Lamentablemente, y como suele pasar en esta prueba tan atractiva por lo ingrata, cero puntos en el desmontar y montar le ponían un signo de pregunta a su participación y ni los 6 del retroceso le iban a servir para terminar en el podio. 49 puntos totales y la certeza de que hay jinete y caballo para rato, y si tienen dudas, sumen los 4 puntos posibles en el desmontar y montar y hagan la cuenta.\n\nGonzalo con Campos Guindalero entraba con la estampa de siempre, pero esta vez no se iba a corroborar en los hechos la jerarquía que tiene. Unos andares problemáticos pagados con 4.5 ya lo complicaban y aunque iba a enhebrar un doble 7.5 en los circulares, iba a perder otro punto en el desmontar y montar y se quedaba con magros 43.5 puntos que no reflejan todo lo que este binomio puede dar.\n\nSituación parecida iba a vivir inmediatamente después con el Ahijuna Guascazo. Gonzalo siempre tiene revancha en la misma prueba porque es raro que clasifique con menos de dos caballos, pero esta no iba a ser la revancha esperada y una prueba muy por debajo de su potencial lo dejaba con solo 31 puntos y la expectativa puesta en los caballos que le quedaban.\n\nRodrigo Castells con Ñandú Cañón, subcampeones vigentes de la categoría, venían con ganas de refrendar lo hecho y entraban a la pista con el tranco alegre y la mirada al frente, quizás sabiendo que después de los 6 puntos de los andares iban a clavar 8.5 en la rayada, como para ir aprontando. Un tropezón en el puntaje con 5.5 en los dos ejercicios circulares le ponían un signo de pregunta a la participación, pero un volapié de 7 y una vuelta de 8 despejaban bastante las dudas. 4 y 5 en el combo de la muerte de los últimos dos ejercicios y un total de 49.5 que difícilmente alcanzarían para ganar, pero que lo ponían primero hasta el momento.\n\nEl año pasado, Ana de Battista había quedado en la historia por ser la primera mujer en clasificar para la final de la rienda A. Este año, su hermana María Fe se convertía en la segunda cuando entraba con su Arraigado Desterrada a dejar bien claro que en esa familia hay clase y que las mujeres ya no necesitan ningún trato especial, han conquistado el mismo nivel que los hombres en todas las categorías de la rienda, y eso es una muy buena noticia. Arrancó cruzada su participación con unos andares de 4.5, pero después encadenó una serie de ejercicios prolijos y bien puntuados que la iban a dejar entreverada, pero sin chances de podio porque, como decimos siempre, en la rienda la regularidad es clave pero necesitás meter algunos goles en un par de movimientos para arañar el podio. 44.5 puntos finales, la satisfacción del deber cumplido y la expectativa de todos de volver a verla (¿quizás a ambas hermanas?) en la final del año próximo.\n\nEl mismo puntaje final iba a alcanzar Pedrín Muñoz con Tatutí Isleta. El multicampeón y vigente defensor del título, venía con esta yegua a probar suerte aunque nos reservaba el plato fuerte para el final. Una prueba similar a la de María Fe, regular pero sin grandes hitos, lo dejaba con el mismo puntaje y con todas las expectativas en la lobuna campeona 2021, que ya estaba lista para entrar en cuanto se lo pidieran.\n\nAriel Ubeda, otro galardonado en la B de 2021, entraba con la Mañanero Maestra y toda su imponencia para refrendar lo hecho el año anterior y para mostrar que estaba a la altura de la prueba y de la historia del prefijo que ensillaba. Y lo estuvo. El puntaje no lo acompañó, el desafío traicionero que suele representar la vuelta sobre las patas para los que pasan de la B a la A le jugó una mala pasada y le ensució lo que había sido una prueba prolija y vistosa. 38.5 para él y todo un año por delante para tomarse revancha.\n\nLuz Buena Agarrate Villa Seca era el caballo y Gonzalo Nievas el jinete. Tercer montado para Gonzalo y ya desde los andares se vio que el resultado iba a ser distinto que los dos anteriores. Estábamos en la segunda mitad de la prueba, todos los binomios que faltaban eran candidatos puestos para llevarse algo grande y eso se notaba. Había algo en el aire que decía que se venían los momentos de definición. Y Gonzalo no le esquivó al desafío: 6, 7.5, 8.5 y 9 en los primeros cuatro movimientos lo ponían en una posición inmejorable que ni siquiera los 4.5 del volapié le iban a quitar. 7.5 en la vuelta sobre las patas y 4 y 5 en el combo final lo dejaban con 52 puntos, muy lejos de todos los demás y con los primeros puntos serios de la tarde. Parecía que se iba a poner bueno y se había puesto bueno nomás.\n\nNico Moreno, no conforme con haber sido campeón de la B en 2020, había clasificado con dos caballos a esta final y entraba con Repecho Macoco para reclamar lo que era suyo. No iba a tener una buena prueba y los 38.5 puntos finales lo dejaban afuera de toda disputa, aunque con la tranquilidad de haber hecho una participación más que digna en su primera final grande.\n\nDijimos que era tiempo de candidatos: vista al frente y con tranco firme entraba Cristian Aguilera en su Pay Kurú Caudillo. Pingo imponente y adornado que se mueve como los dioses y llena la vista, estaba listo para reclamar un lugar en el podio. Y arrancó con todo. Andares y rayada de 6, pero 8 en la troya, 7.5 en el ocho y 8 de nuevo en un volapié que le sacó gritos hasta a los mudos nos pusieron a todos en la punta del asiento. Pero dijimos que la rienda es ingrata, y siempre nos tiene reservada una mala jugada. Los jurados que notan algo raro en la boca del caballo, revisan, encuentran sangre, se dan la mano con el jinete que como siempre mostró toda la caballerosidad que lo caracteriza y la fatalidad y la amargura que se apoderan de todos los que estábamos mirando. No tenemos dudas de que en 2023 el Caudillo va a volver a estar en esa pista. Todos lo esperamos.\n\nVolvía a entrar Gonzalo, ahora sí con su último caballo, Matute Ayacucho El Chacal, lobuno que ya fuera campeón nacional en la temporada 2020 y que no había venido a pasear. Ejemplo perfecto de prueba con mucha regularidad y un par de goles al ángulo, la troya de 8 y la vuelta de 9 fueron la frutilla de un postre que se vino preparando con movimientos muy prolijos de un promedio de 7 puntos cada uno, que lo dejaban a Gonzalo con 54, primero hasta el momento (superándose a sí mismo) y con todas las chances de reclamar un bicampeonato.\n\nPero faltaban dos jinetes y no eran dos jinetes cualquiera. Primero entraba de nuevo el negro Cristian Aguilera que venía por la revancha inmediata enhorquetado en su Tinajera Milonguero, gateado vistoso también y con muchas ganas de dar un golpe sobre la mesa. Y arrancó para ganar, con andares de 7, una rayada bárbara que le pagaron con 8, 7.5 en la troya y el ocho y todos los cañones apuntando al primer lugar del podio. Pero el volapié y la vuelta no le anduvieron esta vez y con 3 y 5 respectivamente se quedaban en las puertas de lo que podría haber sido un podio seguro. 48 puntos finales y las ganas intactas de seguir intentando.\n\nYa sabíamos que había bicampeón. Quedaba definir si el que repetía iba a ser Gonzalo con su lobuno campeón en 2020 o Pedrín con su campeona 2021. Con un condimento más: si Pedrín ganaba, se convertía en el máximo ganador histórico de la prueba, con 6 Campeonatos Nacionales. Superando a Marcos Nievas…padre de Gonzalo. Sumando drama a la expectativa, el último binomio venía a reclamar nada menos que un record que tenía más de 15 años, con un Pedrín que se había reencontrado con el triunfo el año pasado, después de varios años difíciles.\n\nArrancó con 6 en los andares, pero inmediatamente metió 8.5 en la rayada, 8.5 en la troya, 8 en el ocho y 8.5 en el volapié, por si había algún distraído que no se había dado cuenta de lo que estaba pasando. Solo había que prestarle atención a los gritos. 6.5 en la vuelta sobre las patas le agregaron incertidumbre al momento y un desmontar y montar impecable que se pagó con 4 dejaron todo en manos de Pedrín, de la Gualta Presumida y del retroceso. Con 4 puntos y medio era campeón y la gloria, la historia y los records se iban todos para su casa. La tensión era tan grande como el silencio, Pedrín animó a la yegua a arrancar para atrás, la Presumida obedeció, los jurados deliberaron y con 5 puntos completaron los 55 totales que lo convirtieron en bicampeón nacional en años consecutivos y en el máximo ganador histórico.\n\nPor lo tanto, la clasificación final quedó así:\n1. Pedrín Muñoz en Gualta Presumida - 55 puntos\n2. Gonzalo Nievas en Matute Ayacucho El Chacal - 54 puntos\n3. Gonzalo Nievas en Luz Buena Agarrate Villa Seca - 52 puntos\n4. Rodrigo Castells en Ñandú Cañón - 49.5 puntos\n5. Nicolás Moreno en Azote el Revoltoso - 49 puntos\n6. Cristian Aguilera en Tinajera Milonguero - 48 puntos\n7. María Fe de Battista en Arraigado Desterrada - 44.5 puntos\n7. Pedro Muñoz en Tatutí Isleta - 44.5 puntos\n8. Gonzalo Nievas en Campos Guindalero - 43.5 puntos\n9. Nicolás Moreno en Repecho Macoco - 38.5 puntos\n9. Ariel Ubeda en Mañanera Maestra - 38.5 puntos\n10. Gonzalo Nievas en Ahijuna Guascazo - 31 puntos\nB.A. Cristian Aguilera en Pay Kurú Caudillo - S/P\n\nAsí pasaba una final más de la rienda, con sus alegrías y sus sinsabores y con una cuota amarga también esta vez. Pero la amargura quedó salvada para todos los que estuvimos ahí, porque la entrega de premios nos tenía preparada una sorpresa. Hay homenajes más merecidos que otros y trayectorias más destacables que otras. Pero al Negro Bustos todos los homenajes le quedan chicos y todos los elogios a su trayectoria son parciales. Hombre de bien que dejó una huella en la rienda en todo el país, pero especialmente en Córdoba, fue homenajeado por los locales que nos emocionaron a todos con el afecto y la gratitud, que no por merecidas fueron menos conmovedoras. Desde esta columna, y como discípulos del Negro, nos sumamos al cariño y al homenaje. Negro querido, te has ganado toda la gratitud que te entre en el cuerpo."},
            {"id":"2023","year":2023,"title":"La rienda, territorio para las sorpresas","location":"Palermo","date":"Otoño 2023","content":"La rienda, territorio para las sorpresas\n\nTodos los años nos acomodamos alrededor de una pista de arena con la certeza de que muchas cosas van a pasar. Sabemos que los jinetes (y amazonas) finalistas van a dar su mejor esfuerzo, sabemos que va a haber emoción, sabemos que la vamos a pasar bien y sabemos, sobre todo, que no sabemos qué va a pasar cuando se saque el sombrero el último participante.\n\nLa prueba de rienda, especialmente en su categoría máxima, nos viene trayendo, una atrás de la otra, anécdotas y momentos que nadie podía prever cuando sonaba el himno. Nadie imaginaba que Pedrín iba a volver tan fuerte y meter un bicampeonato, nadie creía que una mujer (y ahora dos) iban a llegar a la final, nadie pensaba que un mismo padrillo iba a llenar el podio con tres hijos suyos. Y así siempre, cada año hay algo para llevarse.\n\nPero lo de este 2023, de verdad que va a quedar en los libros de historia. Y lo adelanto al principio de la nota, matando la intriga, porque es tan grande que todos lo sabemos y hay que darle la importancia que se merece. Después de años de trabajo, después de las Copas Femeninas para darle difusión, después de ganar campeonatos en todas las categorías habidas y por haber y después de haber llegado a finales A, en 2023 por primera vez en toda la historia una mujer es Campeona Nacional de Rienda de la máxima categoría.\n\nMaría Fe de Battista, montada en Arraigado Desterrada, se llevó puestos todos los pronósticos y ganó la rienda. Ah, que también era FICCC, por si algo le faltaba. Pero vayamos a ver cómo fue.\n\nEra un día atípico para la final, porque se combinaban la competencia FICCC con la competencia nacional y no todos los caballos participaban en las dos pruebas, así que la lista era bastante interminable, y un poco confusa. Pero arrancaba tomando la pista Indaia Do Caracol, campeona nacional de rienda en Brasil, montada por Marcelo Santana Gaya, que iba a hacer una prueba más que digna para terminar con 40 puntos.\n\nSeguía Gonzalo Nievas, que había clasificado unos 200 caballos aproximadamente, esta vez con Luz Buena Agarrate Villa Seca, el rosillo que ya es veterano de finales. No iba a estar en su día y terminaba con 39.5 puntos.\n\nTinajera Mojinete entraba tras él, uno de los 3 caballos de Pedrín Muñoz, el flamante máximo campeón de la categoría. El colorado iba a terminar con 42.5 puntos para darle paso a otro colorado, Tinajera El jefe, montado por Anita de Battista y ya veterano de finales también, que se iban a ir a la casa con 45.5 puntos.\n\nGonzalo con el Entablado Distraído volvía a tomar la pista y lograba mejorar un poco su participación anterior, esta vez con 43 puntos. Atrás suyo, el Poki Moreno con Vilcún Nido Alto T/E, que iba a clavar 48.5 con la prolijidad de siempre y metiendo los primeros puntos serios del día.\n\nEl siguiente era el Ñandú Cañón, caballo que ya había tenido sus premios y que esta vez entraba con la monta de nada menos que Marcos Nievas. Enhebró varios movimientos muy buenos y parecía que se iba a entreverar arriba, pero lamentablemente quedaría descalificado por bienestar animal.\n\nComo en la vida misma, atrás de los padres vienen los hijos y eso mismo hacía Gonzalo con Matute Ayacucho el Trueno, que se iba a ir con 48 puntos y quedaba segundo en la general, aunque participaba solamente por la FICCC.\n\nEn ese momento no lo sabíamos, pero estábamos a punto de ser testigos de la historia. Entraba María Fe de Battista con Arraigado Desterrada. Una gateada elegante, femenina y prolija, manejada con maestría por María Fe, que ya se había ganado un lugar propio entre los grandes jinetes del país, y venía a refrendarlo.\n\nHicieron una prueba súper prolija, con todos movimientos buenos, ordenados y con la violencia necesaria para sumar puntos. Además, metieron 8.5 en el ocho y 10 en los dos últimos movimientos, cumpliendo con los requisitos básicos para estar arriba: prueba pareja, 10 en los últimos dos y algún movimiento extraordinario. Y ahí estaban ellas, directo desde San Luis, primeras en solitario en la final nacional y final FICCC con 51.5 puntos.\n\nDespués de un intervalo, seguía la historia. Ventor Negro da Robsur, con su negrura impactante y la conducción prolija de Reinaldo Kreusch metía 47.5 puntos para la FICCC y daba paso a Azote El Revoltoso que con Nico Moreno iba a hacer 38.5 puntos. ¿A continuación? Gonzalo Nievas con Tatutí Chacaré, que iban a terminar con 45.5 y la espectacularidad de siempre, que se vio afectada por un volapié que le pagaron 3.5 puntos.\n\nBeravebú Patrón era el otro caballo del gran y ascendente jinete Nico Moreno, y con toda la fuerza con la que vienen empujando, iban a meter 49 puntos totales para arrimarse bien arriba.\n\nPedrín los seguía, esta vez con Cricao Malal Bandolera, para meter otros 49 puntos y poner las cosas interesantes. Aunque todos mirando desde abajo a María Fe y la Desterrada.\n\nEl Poki Moreno traía su segunda monta del día, la rosilla gateada Vilcún La Maga T/E, que no iban a tener un buen día y se iban a quedar con 37 puntos. Tampoco iban a tener el mejor día Cacho Ampuero con Lujanense Horno 'e Barro, que iban a llevarse 48 que aunque son muchos terminaron teniendo gusto a poco, por lo cerquita que estuvieron de juntar algunos más. Y por si nos habíamos quedado con ganas de verlo a Nico Moreno, volvía a entrar a pista esta vez con Repecho Macoco para llevarse otros 48.\n\nYa estaba casi todo dicho, María Fe seguía primera cómoda, pero quedaban nada menos que el subcampeón del año pasado y la bicampeona vigente. Así que quedaba poco, pero a la vez faltaba un mundo.\n\nGonzalo entraba a pista, con Matute Ayacucho el Chacal, pero lamentablemente no iba a poder terminar su participación por cuestiones de bienestar animal.\n\nAsí que era tiempo de la Presumida, que con Pedrín venían a defender su título y ver si podían convertirse en los cuartos tricampeones de la historia. Y arrancó derecho, muy parejito prueba por prueba con María Fe, hasta que terminó la vuelta sobre las patas y quedó a 10.5 puntos de la puntera, con 10 puntos en disputa. Y ahí sí estuvo todo dicho. 49.5 puntos iba a ser el total, empatando el segundo puesto que luego retendría en un desempate.\n\nPero lo importante es que fue el año de María Fe. El año en que todo su esfuerzo y el de sus hermanas dieron sus frutos. El año en que se convirtió en campeona de la A, después de haber sido campeona de la B y también de la C. El año, sobre todo, en el que se inauguró una nueva era en la rienda argentina. Una era en la que hay lugar para todos, porque hay hombres y mujeres jóvenes que siguiendo el rastro de los que marcaron la huella siguen apostando a esta prueba fantástica y dándole años de vida por delante.\n\nTenemos el privilegio de ser protagonistas de una época en la que los fundadores de nuestra prueba la siguen viendo, en la que los máximos campeones siguen compitiendo y en la que la juventud se sigue metiendo. Larga vida a esta disciplina, felicitaciones a María Fe y a todo su gran equipo, y que se vengan muchos premios más, muchas mujeres más y muchos nuevos finalistas. El futuro ya llegó y vino para quedarse."},
            {"id":"2024-25","year":2025,"title":"Final Nacional FZB Categoría A 2024-2025","location":"Palermo","date":"Noviembre 2024","content":"Final Nacional FZB Categoría A - 2024 / 2025\n\nAfuera era un día más. El 37 pasaba por Sarmiento, los vendedores en la puerta del zoológico transcurrían su sábado como cualquier otro y los paseantes en la Rural misma no tenían muy claro el peso de lo que estaba por pasar. Pero adentro no, adentro era distinto. Adentro de la pista se habían ajustado cinchas con un cuidado diferente. Se habían cepillado y trapeado los caballos como no se hace siempre. Las botas no eran las mismas, las espuelas tampoco, habían visto la luz las monturas especiales. Era la Final de la Rienda, era el día más importante de todos los días. Había 13 binomios listos para sacarse los ojos en la Central de Palermo que aparecía perfecta, invitando a ser trajinada bajo un cielo diáfano. Estaba, como nunca, todo dado.\n\nEste año tuvo una cuota diferente, con un desfile seguido del Himno Nacional para darle el marco correspondiente a un evento como este. Con Gonzalo Nievas portando la bandera nacional, como campeón defensor de la categoría, y Nicolás Fazio llevando la bandera de la ACCC como campeón de la categoría B del año pasado y finalista este año.\n\nPasadas las solemnidades, quedaba Gonzalo con la Matute Ayacucho Alegra, esa baya hija del Libertador Esquivo que el año pasado terminara tercera en la final luego del triple empate histórico que tuvimos en el primer lugar. La yegua se vio muy habilidosa y mostró que tiene cartas serias para dejar huella en esta prueba, pero un cero en el desmontar y montar y algunos puntos olvidados por acá y por allá la dejaban con 44.5 y la sensación de que cuando se madure del todo va a ser una yegua peligrosa. La habilidad y el arreglo están.\n\nSeguía María Fe de Battista con su gateada consagrada, la Arraigado Desterrada, que fuera campeona nacional y FICCC en 2023. Una yegua que ya dio todo y demostró su arreglo y su habilidad, pero que venía a reclamar un poquito más. Nos dejó como regalo un volapié extraordinario que se pagó con 8 puntos (el segundo fue de libro, vayan a verlo), pero no pudo llegar a los puntos altos en el resto de su prueba y más allá de la regularidad que tuvo, se volvió para San Luis con gusto a poco. 44 puntos para ellas y a cambiar el chip porque María Fe volvía en un rato.\n\nTomaba la pista Hugo Sánchez, que se vino de Mendoza con toda su barra, en la Gualtallary Fachosa. Una yegua de goma, que se pegaba al piso en sus movimientos con una fuerza impresionante en sus patas. Y lo demostró en la prueba, pero puntos bajos en el combo del ocho, el volapié y la vuelta los iban a dejar con 44 puntos y ganas de más para la próxima temporada.\n\nAlgo parecido le iba a pasar a Raúl Moya con Río Diamante Forastera, esta yegua dos veces subcampeona B y dos veces finalistas de la A. Pero un mal volapié y cero en el desmontar y montar la tiraban para atrás y la dejaban con 37 puntos.\n\nUno atrás del otro venían los participantes, pero la prueba no terminaba de tomar color del todo, faltaba alguien que diera un golpe sobre la mesa. Y ahí apareció el Mañanero Perico. Este gateado impactante, lustroso y muy bien puesto venía con Nico Moreno en sus riendas a refrendar el primer puesto de la semifinal y el éxito de toda la temporada. Un hijo del Oración Papiro en una madre Afinao en la Chicha Baya, este padrillo cría de San Baldomero, expuesto por Cristian Tallone y domado por Fabián García era la sensación de la temporada y tenía la presión de demostrar que lo que había hecho no había sido casualidad.\n\nY vaya si lo hizo. Deslumbró. Enhebró 7.5 puntos en cada uno de los primeros cuatro movimientos, mostrando una habilidad y unas condiciones extraordinarias que iban a aparecer todavía más a la vista en el volapié, que le iban a pagar con 8. En ese volapié hubo un momento extraordinario: el Perico y su jinete fueron al tranco hasta el extremo de la pista y Nico lo paró de frente a la carrera que iba a hacer, reunido, con la nuca en el punto más alto y la grupa ligeramente metida adentro. Posando. Fueron unos 10 segundos donde el caballo pareció decir \"acá estoy yo, ¿les gusta lo que están viendo?\" Ahí Nico lo palmeó y lo soltó en la atropellada. Después, una vuelta de 7.5 para bordar la actuación y un retroceso correcto, lo dejaban con 54 puntos, primero bien lejos de todos los demás y con números serios para los que venían atrás.\n\nComo si no hubiera alcanzado con el Perico, siguiente en el sorteo salió Gonzalo Nievas con Del Yaretal Pichiciego. Un gateado atleta de la cría de Cabaña Pedemonte que había quedado segundo atrás del Perico en la semi y venía ahora a arrebatarle el primer puesto que acababa de conquistar. Y vaya si arrancó derecho con unos andares de 8.5 que fueron extraordinarios y que en la primera parada para volver a la mano izquierda dejaron varias bocas abiertas. Una rayada de 7 y una troya de 7.5 lo mantenían incluso por arriba de lo que había hecho el Perico, pero un traspié en el ocho lo dejaban con 6.5 y con las ilusiones que se le empezaban a desinflar. Parecía que recuperaba con un volapié soberbio que se pagó con 9 puntos y lo dejaba con la obligación de hacer 10 en los últimos dos ejercicios para empatar al puntero. Y casi los hace: 4 en el desmontar y montar y 5.5 en el retroceso lo dejaron con 53.5, segundo por la diferencia más mínima posible. Va a volver este caballo y va a dejar huella.\n\nY para terminar con el trío de puntajes serios antes del corte para arreglar la pista, apareció Pedrín Muñoz en la Cinco Lunas Picardía. No nos iba a dejar con las ganas el máximo campeón de la categoría y se mostró bien prolijo con esta oscura habilidosa que clavó una rayada de 9 que fue una delicia y que sumada a la regularidad del resto de su prueba la dejaba con 51 puntos que lo ponían tercero hasta el momento en la final.\n\nY así nos íbamos al corte, con el primero, segundo y tercero en los puestos hasta el momento habiendo entrado ordenaditos en el cierre de la primera parte. A tomar todos un respiro que esto se había puesto bueno.\n\nPista acomodada y María Fe de Battista de nuevo adentro, esta vez con la Tinajera Loma Blanca. Una gateada imponente que sacó premio de morfología en la Nacional A de Río Cuarto y que venía por primera vez a la final de la rienda a medirse con el resto. Y no defraudó, una prueba muy prolija la dejaba con 48 puntos, con los andares y el ocho como puntos destacados, y la sensación de que tiene para dar más de lo que pudo mostrar aquel sábado. Volverá y hará honor a su sangre y a su arreglo.\n\nSiguiendo con los campeones, era el turno ahora de Pedrín Muñoz otra vez, esta vuelta con el Gualta Cacique. Padrillo de un pelo tostado muy llamativo que también iba a hacer una prueba prolija y parejita para llevarse 48.5 que no alcanzaban para subirse al podio pero sí para dejar una buena impresión.\n\nAtrás, venía Nico Fazio con el Tinajera Mojinete, campeones de la categoría B en 2024 y que habían dejado boquiabiertos a varios en la semifinal de unos días antes. Y no decepcionaron en la final.\n\nComo si fueran veteranos de la categoría, se deslizaron por la pista con potencia, violencia, agilidad y calma, todo en las dosis recomendadas para hacer una prueba extraordinaria que los hubiera dejado bien arriba en el podio si no fuera por unos andares de 5 puntos que le signaron el destino y que hacen más meritorios aún los 48.5 con gusto a remontada. Ya asustan para la próxima temporada.\n\nEra el turno otra vez de Gonzalo, esta vez con la Campos Destacada, esta gateada rubia hija del Miralejos con un físico impresionante más allá de su poca alzada. Iba a marcar 49.5 en la pizarra con una prueba muy prolija pero sin notas extraordinarias y se iba dejando la sensación de que tiene para dar mucho más de lo que pudo mostrar en esta final. La esperamos en 2026.\n\nSe iba terminando la prueba y quedaban solamente dos participantes. A pista el Poky Moreno, veterano de estas finales, enhorquetado en esa gateada preciosa y extraordinaria que es la Mañanera Maestra. Esta hija del Dormido Faconero que ya había sido podio en la B y venía a intentar repetir ahora en la máxima categoría. Y vaya si lo iba a hacer. Arrancó con unos andares tímidos, de 6.5. Pero inmediatamente clavó un 8.5 impresionante en la rayada que siguió con una troya de 8 y un ocho de 7.5. Impresionante y poco habitual secuencia, no se suelen ver circulares tan buenos después de una rayada extraordinaria. Un pequeño retroceso en el volapié que se pagaba 6.5 y una vuelta sobre las patas de 5.5 le hacían temblar la estantería pero 9.5 en los últimos dos ejercicios los dejaban con 52 puntos encaramados en el tercer lugar del podio y con solo un participante que los pudiera desbancar.\n\nCasi sin darnos cuenta se había pasado la prueba, quedaba solo el plato final. Gonzalo Nievas con Luz Buena Agarrate Villa Seca, campeones defensores que entraban a la pista sabiéndose dueños de ella y reclamaban su derecho a pelear por el podio. Y arrancaron fuerte, con 7.5, 7, 8 y 8.5 en los primeros cuatro movimientos que confirmaban la calidad de su arreglo y los ponían en la disputa por el primer lugar. Pero se les derritió la prueba hacia el final y un volapié de 6 y una vuelta de 5.5 sepultaron sus ambiciones por este año. 8.5 en los últimos dos movimientos los dejaban con 51 puntos, empatados en el cuarto lugar con la Cinco Lunas Picardía (que mantendrían ganando el desempate por 20.5 a 19). Un cierre muy digno para un caballo que dio todo lo que tenía.\n\nPor lo tanto, y para los que ya se olvidaron: MAÑANERO PERICO con la monta de Nico Moreno y 54 puntos totales son los Campeones Nacionales de Rienda FZB categoría A de la temporada 2024-2025. Segundos, DEL YARETAL PICHICIEGO con Gonzalo Nievas a nada más que medio punto completando 53.5 y terceros MAÑANERA MAESTRA con Poky Moreno y 52 puntos.\n\nAsí de parejito, así de apretado, así de azaroso, ingrato y fascinante es siempre el campeonato de rienda. Por eso nos fascina, por eso es adictivo y por eso año tras año sigue sumando gente, caballos y adeptos que quedan prendidos de esta pasión.\n\nY también por todo lo otro. Por el placer de arreglar un caballo, la satisfacción de llegar a una pista grande, por los amigos, por la nobleza pura de la comunicación con el montado que no habla, pero dice. Se fue otro campeonato, vendrán más, acá los esperamos."},
            {"id":"2026","year":2026,"title":"Final FZB A 2025-2026","location":"Palermo","date":"Marzo 2026","content":"Final FZB A 2025-2026\n\nSiempre que llovió, paró, pero siempre que paró volvió a llover también y llovida sobre mojado encontrábamos la Pista Central de Palermo aquel sábado 28 de marzo que se había enojado a la madrugada y había tirado baldazos de agua en la arena.\n\nTodo el mundo adentro porque estaba imposible, a reacomodar los horarios para entreverarse en un cronograma por demás apretado, y a la pista las banderas y el himno que se venía la Final de la Rienda, el día de todos los días, el sueño de tantos, el logro de pocos.\n\nLos 14 participantes formados en calma tensa, la emoción protocolar de la Canción Patria y los jurados, ambos debutantes en esta instancia, Felipe Wayar y Tomás Kehoe, listos para evaluar lo que íbamos a ver en la pista.\n\nArrancaba Chiara Piccirelli con su muy linda gateada Cruz Diablo La Ansiosa, que fiel a su nombre se iba a anticipar un poco en los andares y a cometer unos errores que la dejaban un poco renga de puntos para el resto de la prueba. En la rayada iba a tener un par de complicaciones también y, más allá de la fraqueza para parar, se iba a dejar también unos puntos ahí que ya no iba a poder remontar en el resto de la prueba. 39 en el total y la mirada ya puesta en la próxima temporada.\n\nSeguía el Poky Moreno, como siempre, pero con un padrillo con sangres más morfológicas, como pocas veces. Quelú Tamarisco era el caballo, un muy lindo hijo del Zorrino, que arrancaba con unos andares bárbaros, sueltos y firmes que se pagaban con 6 y lo dejaban bastante bien parado para lo que se venía. Unas entradas de patas espectaculares, sobre todo la primera y la tercera, le rindieron 7 puntos y otros 7 en la troya hicieron que ya las tribunas empezaran a prestar mucha atención. Y bien prestada la atención porque fueron nada menos que 8 en el ocho. Lamentablemente el volapié y la vuelta lo iban a traicionar y dejarlo con un total de 46,5 puntos. Primero por el momento y ahora a esperar.\n\nEra el turno de Nico Fazio con Tinajera Mojinete, ya finalista el año pasado y campeón de la B hace algunas temporadas, que arrancaba con unos andares sueltísimos y relajados como siempre, pero que unos tranquitos de galope en el final del trote lo iban a dejar con 5 puntos y con un desafío a remontar para lo que seguía. 6,5 puntos se iba a llevar en un gran ejercicio de la rayada y una troya que largó a fondo lo iba a dejar con 8 puntos más. 7 en el ocho y Nico empezaba a hilvanar una típica participación de las suyas, bien parejita y siempre entre los puntos altos. Y el volapié, qué decir, 8,5 para un movimiento que arrancó aplausos y que no fueron más porque en el tercero se sentó tanto que le costó salir para volver y entregar la prueba. 6 en la vuelta y 8 en los últimos dos movimientos lo dejaban con 49 puntos y mirando a todos desde arriba.\n\nJuan Aveiro aparecía en pista con Cañumil Nazareno, un gateado fuerte y recontra hábil que arrancó con 6,5 en los andares y una parada que no fue todo lo que el caballo podía dar se la pagaban con 4,5 puntos y lo dejaban en una posición difícil para entreverarse arriba. Troya y ocho prolijones que se pagaron con 5 en ambos casos ya lo dejaban fuera de la pelea por el podio, pero la experiencia es valiosa y el éxito es llegar, así que trabajo cumplido para este binomio, 39 totales y a mirar para adelante.\n\nEntraba el subcampeón del año pasado, Del Yaretal Pichiciego, gateado de la cría de la familia Lalanne entre las piernas del multicampeón Gonzalo Nievas. 6 en los andares y 6,5 en una rayada que se vio espectacular pero que tuvo algunos detalles que le robaron puntos lo ponían en un buen lugar, que se confirmaba con una troya de 7. Después, la prueba se le iba a derretir un poco, no iba a hacer pie del todo en los siguientes movimientos y se iba a llevar un total de 38,5 puntos.\n\nDe un Del Yaretal a la otra, en este caso Del Yaretal Salustiana, una muy linda baya hija del Libertador Esquinero que ya se anda viendo en varios hijos en las pistas. La Salustiana venía de ganar la semifinal en la pista central hacía unos días en lo que era su temporada debut en la rienda A y venía a ver cuánto podía reconfirmar de ese éxito. Pero la exigencia de la semi le iba a cobrar un precio alto y no iba a poder mostrar todo su potencial. Un mal ocho y algunos detalles en otras pruebas la dejaban con 38,5 y el valor de haber hecho una muy buena experiencia.\n\nNo daba descanso la prueba y ya aparecía Ernesto Jesús Saravia con el Malarriado Criminal, el vistoso zaino negro hijo del Lengua de Loro que se había visto muy pero muy bien en la semifinal. 6 puntos en los andares y ya el terreno libre para desarrollar el resto de la prueba. 8 puntos en una troya espectacular hacían ilusionar a propios y extraños, pero puntos medio bajones en el resto de los movimientos y un cero en el desmontar y montar lo iban a dejar con 38 puntos y en la mitad de la tabla.\n\nEra el turno del máximo campeón de la historia, Pedro Muñoz con sus seis campeonatos nacionales, entraba en su picazo Caembaé Picarón que no iba a estar en su mejor día y terminaría mezclando altos y bajos para terminar con 42,5 puntos a pesar de una gran troya que le pagaron con 8.\n\nQue pase el que sigue y así era el turno de Juan Aveiro que volvía a la pista esta vez en un picazo muy vistoso, el Contrafuego Carrizalejo, caballo que ya ha estado en instancias decisivas en otras categorías y ahora venía a dejar su firma en la A. 6 puntos en los andares como empezaba a ser costumbre esa mañana en Palermo y 7 en la rayada lo ponían en competencia, confirmaba con 6 en la troya y se daba la posibilidad de entreverarse si hacía algún ejercicio con puntos extraordinarios. Un ocho que no terminó de cuajar y un volapié y una vuelta que dejaron puntos en la arena, le terminaron rindiendo unos muy dignos 44 puntos.\n\nGonzalo Nievas volvía a la pista con Cricao Malal Bandolera, la campeona vigente de la categoría preliminar, que arrancaba a caminar espectacularmente pero un problema en la transición al trote le iba a costar carísimo y terminarían siendo solamente 4,5 puntos en los andares. Una yegua muy prolija y bien arreglada que se llevaba 6 en la rayada y arrancaba una remontada bárbara con 7,5 en la troya y 8 en el ocho que parecían que la entreveraba, pero un 0 en el desmontar y montar la dejaba definitivamente afuera de la pelea con 41 totales.\n\nEl siguiente era Gustavo Fiocchi, ya conocido finalista de la prueba, pero debutando en la final de la A, con su gateado Talapampa Escalafón, imponente padrillo de la cría de los Gómez Quiroga que había cumplido muy bien en la semi. Arrancó prolijo en los dos primeros movimientos, y así siguió toda su prueba. Muy bien movido y con potencia, pero con detalles acá y allá que le restaron puntos y le iban a terminar costando muy caro. 43,5 para una prueba más que correcta que tuvo como punto más alto una muy buena vuelta sobre las patas que le pagaron con 7 puntos.\n\nAhora sí, quedaban solamente tres binomios y el primero de ese trío era Joaquín Crespo que hacía explotar la tribuna con toda la barra que se había venido de Córdoba para hacerle el aguante. Siete Justicia era su yegua, que había mostrado muchas condiciones en la semi y tenía todas las expectativas puestas para la final. Una hija del Merengue en madre Facón, que arrancó con unos andares espectaculares y recontra correctos que se pagaron con 8,5 puntos, el mayor puntaje hasta el momento. Pero no había que distraerse, porque se venía la rayada y si algo tiene la Justicia es patas. Y vaya si las mostró, unas paradas espectaculares que arrancaron alaridos en la tribuna y se terminaban pagando con 7 porque en la segunda se trabó un poquito, pero fue un espectáculo. Una troya fantástica era lo que seguía, fuerte y bien chiquita, que se pagaba con 7,5 puntos y ya la cosa se ponía seria. Venía prolijo y en los puntos altos, no bajaba de los 7 que era lo que le pagaban el ocho y se preparaba para el volapié que iba a ser el primer tropezón de su prueba con 5,5 puntos. 6,5 iban a ser los de la vuelta y 9 en los últimos dos ejercicios lo dejaban con 51, primero en romper la barrera de los 50, y con podio asegurado.\n\nSe empezaba a terminar la prueba y entraban los campeones defensores. El primero era Gonzalo Nievas con Campos Destacada, esta hija del Miralejos campeona de la Copa Especial 2025. Arrancaban con 6,5 puntos y parecía que iban a tener cosas para decir pero 5,5 en la rayada ya los empezaban a dejar fuera del campeonato. Gonzalo la embaló a fondo en la troya para tratar de recuperar posiciones, pero se llevó solamente 6 puntos y ahí sí se empezaron a despedir de las aspiraciones al título. 41 puntos finales y a mirar la próxima temporada.\n\nY ahora sí, el esperado por todos, Mañanero Perico, Campeón Nacional de la temporada pasada que quería demostrar que no había sido casualidad y que esa pista era suya. Entraba vistoso y reluciente tranqueando con su soltura habitual y se llevaba 7,5 en los andares. Buenos puntos, pero en el mano a mano con la Justicia ya estaba un punto abajo y había que salir a remontar. Y vaya si lo hizo, dos paradas tremendas y una un poco más discreta pero muy buena también lo dejaban con 8,5 puntos en la rayada y todo por pelear todavía. Una muy buena troya aunque con algunos detalles le rendían 6,5 puntos, al igual que en el ocho, y quedaban el volapié y la vuelta para reclamar lo que todavía era suyo. Un volapié con algunos detalles se pagó 6 puntos y parecía que el campeonato agarraba la autopista y se iba para Córdoba, pero todavía quedaba prueba, quedaba Perico y quedaba Nico Moreno y clavaron una vuelta de 9 que junto con los 4 del desmontar y montar y los 5 del retroceso, los dejaron con 53,5 puntos y en consecuencia BICAMPEONES NACIONALES de la prueba.\n\nPor lo tanto, el podio quedó conformado con Nicolás Moreno y Mañanero Perico en primer lugar con 53,5 puntos repitiendo el campeonato del año pasado; Joaquín Crespo y Del Siete Justicia con 51 puntos y Nicolás Fazio con Tinajera Mojinete con 49,5 totales.\n\nSiempre es emocionante ver a un campeón defensor retener el título, confirmar sus credenciales. Porque no pasa seguido, porque entra último en el orden de participación y porque se inscribe en la Historia de la raza con letras mayúsculas. Las felicitaciones a Nico Moreno, a Fabián García, a Cristian Tallone y a toda la gente que estuvo involucrada en la formación y presentación de ese caballo extraordinario que es el Perico y que todos, un poco por morbo y otro poco por fanáticos, ya queremos ver en la final del año que viene a ver si aparece un tricampeón nuevo, el quinto de la historia, y después de tantos años. Acá estaremos para contárselo.\n\nPero pasó algo más también, que no podemos dejar de destacar. Tanto el subcampeón como el tercero son excampeones de la categoría B y tienen una larga trayectoria en participaciones en la prueba. Como había pasado con María Fe de Battista cuando ganó con la Desterrada, volvemos a tener participantes exitosos que llegan como culminación del tránsito que ofrece la prueba hacia la máxima categoría. Acaso estemos asistiendo a un cambio de época: una nueva era en la que las promesas se confirman y los nombres cambian para que la historia siga."}
        ];

        class Blog {
            constructor() {
                this.articles = articlesData;
                this.view = 'home';
                this.current = null;
                this.query = '';
                this.year = '';
                this.years = [...new Set(this.articles.map(a => a.year))].sort((a,b) => b-a);
                this.render();
            }

            filter() {
                return this.articles.filter(a => {
                    const q = this.query.toLowerCase();
                    const titleMatch = a.title.toLowerCase().includes(q);
                    const contentMatch = a.content.toLowerCase().includes(q);
                    const matches = q === '' || titleMatch || contentMatch;
                    const year_match = this.year === '' || a.year.toString() === this.year;
                    return matches && year_match;
                }).sort((a,b) => b.year - a.year);
            }

            render() {
                const app = document.getElementById('app');
                if (this.view === 'article') {
                    const a = this.articles.find(x => x.id === this.current);
                    if (!a) return;
                    app.innerHTML = `<div class="container"><button class="back-btn" onclick="blog.goHome()">← Volver</button><h1>${a.title}</h1><div class="article-view-meta"><span>${a.location}</span><span>${a.date}</span></div><div class="article-view-content">${a.content.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div></div>`;
                } else if (this.query === '' && this.year === '') {
                    app.innerHTML = `<div class="home-header"><h1>Notas Criollas</h1><div class="search-box"><input type="text" class="search-input" id="search" placeholder="Buscar por palabra clave, año o tema..." autocomplete="off"/><div class="suggestions" id="suggestions"></div></div></div>`;
                    this.setupSearch();
                } else {
                    const filtered = this.filter();
                    app.innerHTML = `<div class="container"><div class="filters"><div class="search-control"><input type="text" class="search-input" id="search" placeholder="Buscar..." value="${this.query}" autocomplete="off"/><div class="suggestions" id="suggestions"></div></div><select class="filter-select" onchange="blog.year=this.value;blog.render()"><option value="">Todos los años</option>${this.years.map(y => `<option value="${y}" ${this.year===y.toString()?'selected':''}>${y}</option>`).join('')}</select><button class="clear-btn" onclick="blog.query='';blog.year='';blog.render()">Limpiar</button></div><div class="results-info">${filtered.length} artículo${filtered.length!==1?'s':''}</div><div class="articles-grid">${filtered.length > 0 ? filtered.map(a => `<div class="article-card" onclick="blog.view='article';blog.current='${a.id}';blog.render()"><div class="article-card-title"><span>${a.title}</span><span class="article-card-year">${a.year}</span></div><div class="article-card-meta">${a.location} • ${a.date}</div></div>`).join('') : '<div class="empty-state">No se encontraron artículos.</div>'}</div></div>`;
                    this.setupSearch();
                }
            }

            setupSearch() {
                const input = document.getElementById('search');
                if (!input) return;
                
                input.addEventListener('input', (e) => {
                    this.query = e.target.value;
                    const suggestions = document.getElementById('suggestions');
                    if (this.query.length > 1) {
                        const matches = this.articles.filter(a => 
                            a.title.toLowerCase().includes(this.query.toLowerCase()) ||
                            a.content.toLowerCase().includes(this.query.toLowerCase())
                        );
                        if (matches.length > 0) {
                            suggestions.classList.add('active');
                            suggestions.innerHTML = matches.slice(0, 5).map(a => `<div class="suggestion-item" onclick="blog.current='${a.id}';blog.view='article';blog.query='';blog.year='';blog.render()">${a.title}</div>`).join('');
                        } else {
                            suggestions.classList.remove('active');
                        }
                    } else {
                        suggestions.classList.remove('active');
                    }
                });

                input.addEventListener('blur', () => {
                    setTimeout(() => {
                        const sug = document.getElementById('suggestions');
                        if (sug) sug.classList.remove('active');
                    }, 200);
                });
                
                input.focus();
            }

            goHome() {
                this.view = 'home';
                this.current = null;
                this.query = '';
                this.year = '';
                this.render();
            }
        }

        const blog = new Blog();
    </script>
