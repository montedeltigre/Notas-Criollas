                content: `La rienda, territorio para las sorpresas
Todos los años nos acomodamos alrededor de una pista de arena con la certeza de que
muchas cosas van a pasar. Sabemos que los jinetes (y amazonas) finalistas van a dar su mejor
esfuerzo, sabemos que va a haber emoción, sabemos que la vamos a pasar bien y sabemos,
sobre todo, que no sabemos qué va a pasar cuando se saque el sombrero el último
participante.
La prueba de rienda, especialmente en su categoría máxima, nos viene trayendo, una atrás de
la otra, anécdotas y momentos que nadie podía prever cuando sonaba el himno. Nadie
imaginaba que Pedrín iba a volver tan fuerte y meter un bicampeonato, nadie creía que una
mujer (y ahora dos) iban a llegar a la final, nadie pensaba que un mismo padrillo iba a llenar el
podio con tres hijos suyos. Y así siempre, cada año hay algo para llevarse.
Pero lo de este 2023, de verdad que va a quedar en los libros de historia. Y lo adelanto al
principio de la nota, matando la intriga, porque es tan grande que todos lo sabemos y hay que
darle la importancia que se merece. Después de años de trabajo, después de las Copas
Femeninas para darle difusión, después de ganar campeonatos en todas las categorías
habidas y por haber y después de haber llegado a finales A, en 2023 por primera vez en toda la
historia una mujer es Campeona Nacional de Rienda de la máxima categoría.
María Fe de Battista, montada en Arraigado Desterrada, se llevó puestos todos los pronósticos
y ganó la rienda. Ah, que también era FICCC, por si algo le faltaba. Pero vayamos a ver cómo
fue.
Era un día atípico para la final, porque se combinaban la competencia FICCC con la
competencia nacional y no todos los caballos participaban en las dos pruebas, así que la lista
era bastante interminable, y un poco confusa. Pero arrancaba tomando la pista Indaia Do
Caracol, campeona nacional de rienda en Brasil, montada por Marcelo Santana Gaya, que iba
a hacer una prueba más que digna para terminar con 40 puntos.
Seguía Gonzalo Nievas, que había clasificado unos 200 caballos aproximadamente, esta vez
con Luz Buena Agarrate Villa Seca, el rosillo que ya es veterano de finales. No iba a estar en su
día y terminaba con 39.5 puntos.
Tinajera Mojinete entraba tras él, uno de los 3 caballos de Pedrín Muñoz, el flamante máximo
campeón de la categoría. El colorado iba a terminar con 42.5 puntos para darle paso a otro
colorado, Tinajera El jefe, montado por Anita de Battista y ya veterano de finales también, que
se iban a ir a la casa con 45.5 puntos.
Gonzalo con el Entablado Distraído volvía a tomar la pista y lograba mejorar un poco su
participación anterior, esta vez con 43 puntos. Atrás suyo, el Poki Moreno con Vilcún Nido Alto
T/E, que iba a clavar 48.5 con la prolijidad de siempre y metiendo los primeros puntos serios
del día.
El siguiente era el Ñandú Cañón, caballo que ya había tenido sus premios y que esta vez
entraba con la monta de nada menos que Marcos Nievas. Enhebró varios movimientos muybuenos y parecía que se iba a entreverar arriba, pero lamentablemente quedaría descalificado
por bienestar animal.
Como en la vida misma, atrás de los padres vienen los hijos y eso mismo hacía Gonzalo con
Matute Ayacucho el Trueno, que se iba a ir con 48 puntos y quedaba segundo en la general,
aunque participaba solamente por la FICCC.
En ese momento no lo sabíamos, pero estábamos a punto de ser testigos de la historia.
Entraba María Fe de Battista con Arraigado Desterrada. Una gateada elegante, femenina y
prolija, manejada con maestría por María Fe, que ya se había ganado un lugar propio entre los
grandes jinetes del país, y venía a refrendarlo.
Hicieron una prueba súper prolija, con todos movimientos buenos, ordenados y con la violencia
necesaria para sumar puntos. Además, metieron 8.5 en el ocho y 10 en los dos últimos

        class RiendaBlog {
            constructor() {
                this.articles = articles;
                this.currentView = 'home';
                this.currentArticle = null;
                this.query = '';
                this.filters = { year: '' };
                this.initSuggestions();
                this.render();
            }

            initSuggestions() {
                const years = new Set();
                this.articles.forEach(a => years.add(a.year));
                this.years = Array.from(years).sort((a, b) => b - a);
            }

            getFilteredArticles() {
                return this.articles.filter(article => {
                    const matchesQuery = this.query === '' || 
                        article.title.toLowerCase().includes(this.query.toLowerCase()) ||
                        article.content.toLowerCase().includes(this.query.toLowerCase());
                    
                    const matchesYear = this.filters.year === '' || article.year.toString() === this.filters.year;
                    
                    return matchesQuery && matchesYear;
                }).sort((a, b) => b.year - a.year);
            }

            getSuggestions() {
                if (this.query.length < 2) return [];
                const q = this.query.toLowerCase();
                const suggestions = [];
                const matchingTitles = this.articles.filter(a => a.title.toLowerCase().includes(q));
                if (matchingTitles.length > 0) {
                    suggestions.push({ type: 'category', text: 'Artículos' });
                    matchingTitles.slice(0, 5).forEach(t => {
                        suggestions.push({ type: 'article', text: t.title, id: t.id });
                    });
                }
                return suggestions;
            }

            handleSuggestionClick(suggestion) {
                if (suggestion.type === 'article') {
                    this.currentView = 'article';
                    this.currentArticle = suggestion.id;
                }
                this.query = '';
                this.render();
            }

            render() {
                const app = document.getElementById('app');
                
                if (this.currentView === 'article') {
                    const article = this.articles.find(a => a.id === this.currentArticle);
                    app.innerHTML = `
                        <div class="container">
                            <button class="back-btn" onclick="blog.goHome()">← Volver</button>
                            <h1>${article.title}</h1>
                            <div class="article-view-meta">
                                <span>${article.location}</span>
                                <span>${article.date}</span>
                            </div>
                            <div class="article-view-content">${article.content}</div>
                        </div>
                    `;
                } else if (this.query === '' && this.filters.year === '') {
                    app.innerHTML = `
                        <div class="home-header">
                            <h1>Mis notas</h1>
                            <div class="search-box">
                                <input type="text" class="search-input" id="search-input" placeholder="Buscar..." autocomplete="off" />
                                <div class="suggestions" id="suggestions"></div>
                            </div>
                        </div>
                    `;
                    this.setupSearch();
                } else {
                    const filtered = this.getFilteredArticles();
                    app.innerHTML = `
                        <div class="container">
                            <div class="filters">
                                <div class="search-control">
                                    <input type="text" class="search-input" id="search-input" placeholder="Buscar..." value="${this.query}" autocomplete="off" />
                                    <div class="suggestions" id="suggestions"></div>
                                </div>
                                <select class="filter-select" onchange="blog.setFilter('year', this.value)">
                                    <option value="">Todos los años</option>
                                    ${this.years.map(y => `<option value="${y}" ${this.filters.year === y.toString() ? 'selected' : ''}>${y}</option>`).join('')}
                                </select>
                                <button class="clear-btn" onclick="blog.clearFilters()">Limpiar</button>
                            </div>
                            <div class="results-info">${filtered.length} artículo${filtered.length !== 1 ? 's' : ''}</div>
                            <div class="articles-grid">
                                ${filtered.length > 0 ? filtered.map(article => `
                                    <div class="article-card" onclick="blog.viewArticle('${article.id}')">
                                        <div class="article-card-title">
                                            <span>${article.title}</span>
                                            <span class="article-card-year">${article.year}</span>
                                        </div>
                                        <div class="article-card-meta">${article.location} • ${article.date}</div>
                                    </div>
                                `).join('') : '<div class="empty-state">No se encontraron artículos.</div>'}
                            </div>
                        </div>
                    `;
                    this.setupSearch();
                }
            }

            setupSearch() {
                const input = document.getElementById('search-input');
                const suggestionsContainer = document.getElementById('suggestions');
                input.addEventListener('input', (e) => {
                    this.query = e.target.value;
                    const suggestions = this.getSuggestions();
                    if (suggestions.length > 0) {
                        suggestionsContainer.classList.add('active');
                        suggestionsContainer.innerHTML = suggestions.map((s) => {
                            if (s.type === 'category') return `<div class="suggestion-category">${s.text}</div>`;
                            return `<div class="suggestion-item" onclick="blog.handleSuggestionClick({type:'article',id:'${s.id}'})">${s.text}</div>`;
                        }).join('');
                    } else {
                        suggestionsContainer.classList.remove('active');
                    }
                });
                input.addEventListener('blur', () => {
                    setTimeout(() => suggestionsContainer.classList.remove('active'), 200);
                });
                input.focus();
            }

            setFilter(key, value) {
                this.filters[key] = value;
                this.render();
            }

            clearFilters() {
                this.query = '';
                this.filters = { year: '' };
                this.render();
            }

            viewArticle(id) {
                this.currentView = 'article';
                this.currentArticle = id;
                this.render();
            }

            goHome() {
                this.currentView = 'home';
                this.currentArticle = null;
                this.query = '';
                this.filters = { year: '' };
                this.render();
            }
        }

        let blog = new RiendaBlog();
    </script>
